name: Production Deployment

# Triggers only on the `prod` branch (kept separate from main so CI tests
# on main never accidentally kick off a production deploy).
# Manual runs via workflow_dispatch are also supported.
on:
  push:
    branches: [Prod]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'nginx/**'
      - 'docker-compose.prod.reha-advisor.yml'
      - '.github/workflows/deploy-prod.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # 1. Tests — same pattern as tests.yml so secrets / coverage work correctly
  # ---------------------------------------------------------------------------
  test:
    name: Run Tests Before Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write env file
        run: echo "${{ secrets.ENV_FILE_DEV }}" > .env

      - name: Load env file and apply CI overrides
        run: |
          while IFS= read -r line; do
            [[ "$line" =~ ^\s*# ]] && continue
            [[ -z "${line//[[:space:]]/}" ]] && continue
            echo "$line" >> "$GITHUB_ENV"
          done < .env
          echo "DB_HOST=localhost"                    >> "$GITHUB_ENV"
          echo "DISABLE_MONGO_CONNECT=1"             >> "$GITHUB_ENV"
          echo "MONGO_TLS=false"                     >> "$GITHUB_ENV"
          echo "REDIS_URL=redis://localhost:6379/0"  >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: pytest --tb=short -q

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Run frontend tests
        working-directory: frontend
        run: |
          npm ci
          npm test -- --watchAll=false --testTimeout=10000

  # ---------------------------------------------------------------------------
  # 2. Build — push images to GHCR
  # ---------------------------------------------------------------------------
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: test
    permissions:
      contents: read
      packages: write

    outputs:
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
      backend-image: ${{ steps.meta-backend.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod.reha-advisor
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # 3. Deploy to staging (optional — only fires on push to prod branch)
  #    Production deploy does NOT depend on this job succeeding.
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/prod'
    environment:
      name: staging
      url: https://staging.reha-advisor.ch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USERNAME }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/reha-advisor-staging
            git pull origin prod
            docker compose -f docker-compose.prod.reha-advisor.yml down || true
            docker compose -f docker-compose.prod.reha-advisor.yml pull
            docker compose -f docker-compose.prod.reha-advisor.yml up -d
            docker exec django-prod python manage.py migrate
            docker exec django-prod python manage.py collectstatic --noinput
            docker exec django-prod python manage.py seed_admin
            docker exec django-prod python manage.py seed_feedback_questions
            sleep 10
            docker compose -f docker-compose.prod.reha-advisor.yml ps

      - name: Health check
        run: |
          max_attempts=30
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if curl -f https://staging.reha-advisor.ch/health; then
              echo "✅ Staging deployment successful"
              exit 0
            fi
            attempt=$((attempt + 1))
            sleep 2
          done
          echo "❌ Health check failed"
          exit 1

  # ---------------------------------------------------------------------------
  # 4. Deploy to production
  #    Depends only on `build` so it can run even when staging is skipped.
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/prod' &&
       contains(github.event.head_commit.message, '[deploy-prod]'))
    environment:
      name: production
      url: https://reha-advisor.ch
    concurrency:
      group: production-deployment
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify production readiness
        run: |
          echo "🔍 Verifying production readiness..."
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "❌ Build failed — cannot deploy to production"
            exit 1
          fi
          echo "✅ All checks passed — ready for production deployment"

      - name: Create backup
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/reha-advisor
            echo "Creating database backup..."
            ./scripts/backup.sh

      - name: Deploy to production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/reha-advisor
            echo "🚀 Starting production deployment..."
            git pull origin prod
            docker compose -f docker-compose.prod.reha-advisor.yml ps > /tmp/before-deploy.txt
            echo "📦 Pulling latest Docker images..."
            docker compose -f docker-compose.prod.reha-advisor.yml pull
            echo "⚙️  Starting new services..."
            docker compose -f docker-compose.prod.reha-advisor.yml up -d
            echo "⏳ Waiting for services to be healthy..."
            sleep 15
            echo "🗄️  Running database migrations..."
            docker exec django-prod python manage.py migrate
            echo "📁 Collecting static files..."
            docker exec django-prod python manage.py collectstatic --noinput
            echo "🌱 Seeding admin user..."
            docker exec django-prod python manage.py seed_admin
            echo "🌱 Seeding feedback questions..."
            docker exec django-prod python manage.py seed_feedback_questions
            echo "✅ Verifying deployment..."
            docker compose -f docker-compose.prod.reha-advisor.yml ps

      - name: Production health check
        run: |
          echo "🏥 Running production health checks..."
          max_attempts=60
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            http_code=$(curl -s -o /dev/null -w "%{http_code}" https://reha-advisor.ch/health)
            if [ "$http_code" = "200" ]; then
              echo "✅ Production health check passed (HTTP $http_code)"
              exit 0
            fi
            echo "⏳ Attempt $((attempt + 1))/$max_attempts — HTTP $http_code"
            attempt=$((attempt + 1))
            sleep 2
          done
          echo "❌ Production health check failed"
          exit 1

      - name: Verify database
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/reha-advisor
            echo "🗄️  Verifying database..."
            docker exec db-prod mongosh admin --eval 'db.adminCommand("ping")' || exit 1
            echo "✅ Database verification passed"

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Production deployment successful!"
          echo "🌍 Service available at: https://reha-advisor.ch"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/reha-advisor
            echo "❌ Production deployment failed — rolling back..."
            docker compose -f docker-compose.prod.reha-advisor.yml down
            git checkout HEAD~1
            docker compose -f docker-compose.prod.reha-advisor.yml up -d

  # ---------------------------------------------------------------------------
  # 5. Notify — Slack + GitHub deployment status
  # ---------------------------------------------------------------------------
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.deploy-production.result }}" == "success" ]]; then
            echo "status=✅ Production deployment successful" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Production deployment failed" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            ${{ steps.status.outputs.status }}

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}

            URL: https://reha-advisor.ch
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          fields: repo,message,commit,author,action,eventName,ref,workflow

      - name: Create GitHub deployment status
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const deployment_status = '${{ needs.deploy-production.result }}' === 'success' ? 'success' : 'failure';
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment?.id,
              state: deployment_status,
              description: 'Production deployment ${{ needs.deploy-production.result }}',
              environment_url: 'https://reha-advisor.ch'
            });

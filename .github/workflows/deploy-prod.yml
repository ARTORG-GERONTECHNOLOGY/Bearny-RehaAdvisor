name: Production Deployment

# Triggers only when a GitHub Release is published (e.g. v1.2.3).
# This means production deploys are always tied to a specific immutable tag,
# not to an arbitrary branch state.
#
# Manual re-runs are still available via workflow_dispatch (useful for
# re-deploying the same tag after an infra issue without creating a new release).
#
# Secrets required (repository or production environment):
#   ENV_FILE_DEV         — full contents of .env.dev for CI test run
#   PROD_HOST            — SSH host for production server
#   PROD_USERNAME        — SSH user
#   PROD_SSH_KEY         — private SSH key (PEM)
#   VITE_SENTRY_DSN      — baked into the frontend image at build time
#   SLACK_WEBHOOK_URL    — optional Slack notifications
#
# GitHub Environment: "production"
#   Recommended: add required reviewers so every release needs approval
#   before the deploy job actually runs.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to deploy (e.g. v1.2.3) — defaults to latest release tag'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # 1. Tests — run the full backend + frontend suite against the release tag
  # ---------------------------------------------------------------------------
  test:
    name: Run Tests Before Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag || github.ref }}

      - name: Write env file
        run: echo "${{ secrets.ENV_FILE_DEV }}" > .env

      - name: Load env file and apply CI overrides
        run: |
          while IFS= read -r line; do
            [[ "$line" =~ ^\s*# ]] && continue
            [[ -z "${line//[[:space:]]/}" ]] && continue
            echo "$line" >> "$GITHUB_ENV"
          done < .env
          echo "DB_HOST=localhost"                    >> "$GITHUB_ENV"
          echo "DISABLE_MONGO_CONNECT=1"             >> "$GITHUB_ENV"
          echo "MONGO_TLS=false"                     >> "$GITHUB_ENV"
          echo "REDIS_URL=redis://localhost:6379/0"  >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: pytest --tb=short -q

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Run frontend tests
        working-directory: frontend
        timeout-minutes: 5
        continue-on-error: true
        run: |
          npm ci
          npm test -- --watchAll=false --testTimeout=10000 --forceExit

  # ---------------------------------------------------------------------------
  # 2. Build — push versioned images to GHCR
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: test
    if: always()
    permissions:
      contents: read
      packages: write

    outputs:
      tag: ${{ steps.resolve-tag.outputs.tag }}

    steps:
      - name: Resolve deployment tag
        id: resolve-tag
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag || github.ref_name }}"
          IMAGE_TAG="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "Deploying tag: $TAG"
          echo "Image tag for GHCR: $IMAGE_TAG"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve-tag.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=semver,pattern={{version}},value=${{ steps.resolve-tag.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.resolve-tag.outputs.tag }}
            type=raw,value=${{ steps.resolve-tag.outputs.image_tag }}
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./frontend/Dockerfile.prod.reha-advisor
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
          cache-from: type=gha,scope=frontend-root
          cache-to: type=gha,mode=max,scope=frontend-root

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=semver,pattern={{version}},value=${{ steps.resolve-tag.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.resolve-tag.outputs.tag }}
            type=raw,value=${{ steps.resolve-tag.outputs.image_tag }}
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # 3. Deploy to production
  #    Uses the GitHub "production" environment — add required reviewers there
  #    to gate every deploy behind a manual approval step.
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: production
      url: https://reha-advisor.ch
    concurrency:
      group: production-deployment
      cancel-in-progress: false
    permissions:
      contents: read
      packages: read

    steps:
      - name: Create pre-deploy backup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -euo pipefail
            # Prod lives in its own directory — never touches the dev/local-prod checkout
            PROD_DIR=/home/ubuntu/repos/telerehabapp-prod
            if [ -d "$PROD_DIR" ]; then
              cd "$PROD_DIR"
              echo "Creating database backup before deploy..."
              if [ -f ./scripts/backup.sh ]; then ./scripts/backup.sh || echo "Backup failed (non-fatal) — continuing deploy"; fi
            fi

      - name: Authenticate prod server with GHCR
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

      - name: Deploy release ${{ needs.build.outputs.tag }} to production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -euo pipefail
            PROD_DIR=/home/ubuntu/repos/telerehabapp-prod
            REPO_URL=https://github.com/${{ github.repository }}.git
            TAG="${{ needs.build.outputs.tag }}"

            echo "Deploying tag: $TAG to $PROD_DIR"

            # Clone on first deploy, otherwise fetch
            if [ ! -d "$PROD_DIR/.git" ]; then
              mkdir -p "$PROD_DIR"
              git -C "$PROD_DIR" init
              git -C "$PROD_DIR" remote add origin "$REPO_URL"
            fi
            cd "$PROD_DIR"
            git fetch --all --tags --force
            git checkout -f "$TAG"

            # .env.prod must be placed manually on the server at $PROD_DIR/.env.prod
            if [ ! -f .env.prod ]; then
              echo "ERROR: $PROD_DIR/.env.prod not found — place it on the server before deploying"
              exit 1
            fi

            DC="docker compose -f docker-compose.prod.reha-advisor.yml --env-file .env.prod"
            export IMAGE_TAG="${TAG#v}"
            echo "Using IMAGE_TAG=$IMAGE_TAG for compose pull/up"

            # Ensure server-side data files exist (created once, persist across deploys)
            mkdir -p ./data ./mongo/tls
            touch -a ./data/db.sqlite3

            # Pull the pre-built images for this tag from GHCR
            # (GHCR login is done in the preceding step, credentials cached in ~/.docker/config.json)
            $DC pull

            # Bring up new containers (does not touch dev or local-prod)
            $DC up -d

            echo "Waiting for containers to settle..."
            sleep 15

            docker exec django-prod python manage.py migrate
            docker exec django-prod python manage.py collectstatic --noinput
            docker exec django-prod python manage.py seed_admin
            docker exec django-prod python manage.py seed_feedback_questions
            docker exec django-prod python manage.py seed_periodic_tasks

            # Connect gateway to the prod network (idempotent) and switch routing
            docker network connect telereha-prod gateway 2>/dev/null || true
            sed -i 's/nginx-localprod/nginx-prod/g' /home/ubuntu/repos/telerehabapp/nginx/gateway.nginx.conf
            docker kill -s HUP gateway

            # Reload nginx-prod so it picks up any config changes from the bind mount
            docker kill -s HUP nginx-prod

            echo "Deployed $TAG successfully"
            $DC ps

            # Clean up old images to free disk space
            docker image prune -f

      - name: Production health check
        run: |
          max_attempts=60
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            http_code=$(curl -s -o /dev/null -w "%{http_code}" https://reha-advisor.ch/health || true)
            if [ "$http_code" = "200" ]; then
              echo "✅ Production health check passed (HTTP $http_code)"
              exit 0
            fi
            echo "Attempt $((attempt + 1))/$max_attempts — HTTP $http_code"
            attempt=$((attempt + 1))
            sleep 2
          done
          echo "❌ Production health check failed"
          exit 1

      - name: Verify database connectivity
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker exec db-prod mongosh --tls --tlsAllowInvalidCertificates admin --eval 'db.adminCommand("ping")' || exit 1
            echo "✅ Database OK"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            PROD_DIR=/home/ubuntu/repos/telerehabapp-prod
            cd "$PROD_DIR"
            echo "❌ Deploy failed — rolling back to previous tag..."
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              git checkout -f "$PREV_TAG"
              export IMAGE_TAG="${PREV_TAG#v}"
              docker compose -f docker-compose.prod.reha-advisor.yml pull || true
              docker compose -f docker-compose.prod.reha-advisor.yml up -d
              # Revert gateway routing back to local-prod
              sed -i 's/nginx-prod/nginx-localprod/g' /home/ubuntu/repos/telerehabapp/nginx/gateway.nginx.conf
              docker kill -s HUP gateway
              echo "Rolled back to $PREV_TAG"
            else
              echo "No previous tag found — manual intervention required"
              exit 1
            fi

  # ---------------------------------------------------------------------------
  # 4. Notify
  # ---------------------------------------------------------------------------
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Send Slack notification
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            ${{ needs.deploy-production.result == 'success' && '✅ Production deployment successful' || '❌ Production deployment failed' }}

            Release: ${{ github.event.release.tag_name || inputs.tag }}
            Repository: ${{ github.repository }}
            Author: ${{ github.actor }}
            URL: https://reha-advisor.ch
          fields: repo,message,commit,author,action,eventName,ref,workflow

      - name: Create GitHub deployment status
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const state = '${{ needs.deploy-production.result }}' === 'success' ? 'success' : 'failure';
            if (context.payload.deployment?.id) {
              github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: context.payload.deployment.id,
                state,
                description: `Production deployment ${{ needs.deploy-production.result }}`,
                environment_url: 'https://reha-advisor.ch'
              });
            }

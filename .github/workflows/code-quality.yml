name: Code Quality

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/code-quality.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - 'backend/**'

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install coverage

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate test coverage (Backend)
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: api.settings.dev
          DB_HOST: localhost
          DB_PORT: '27017'
          DB_NAME: reha_advisor_test
          MONGO_TLS: 'false'
          DISABLE_MONGO_CONNECT: '1'
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-key
        run: |
          pytest --cov=. --cov-report=xml --cov-report=json || true

      - name: Generate test coverage (Frontend)
        working-directory: frontend
        run: npm test -- --coverage --watchAll=false --testTimeout=10000 || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  code-metrics:
    name: Code Metrics
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Calculate Python metrics
        run: |
          pip install radon
          
          echo "## Python Code Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Cyclomatic Complexity" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          radon cc backend --average || true >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Maintainability Index" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          radon mi backend --average || true >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Calculate JavaScript metrics
        run: |
          npm install -g cloc
          
          echo "## JavaScript Code Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Lines of Code" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cloc frontend --json | jq . || true >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  formatting-check:
    name: Code Formatting Check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Check Python formatting (Black)
        working-directory: backend
        run: |
          pip install black
          black --check . --diff

      - name: Check Python imports (isort)
        working-directory: backend
        run: |
          pip install isort
          isort --check-only . --diff

      - name: Check JavaScript formatting (Prettier)
        working-directory: frontend
        run: |
          npm ci
          npx prettier --check .

      - name: Lint JavaScript (ESLint)
        working-directory: frontend
        continue-on-error: true
        run: npm run lint

      - name: Lint Python (Flake8)
        working-directory: backend
        continue-on-error: true
        run: |
          pip install flake8
          flake8 . --max-line-length=120 --extend-ignore=E203

  type-checking:
    name: Type Checking
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Check TypeScript types
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit || true

  component-tests:
    name: Component & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Run component tests
        working-directory: frontend
        run: |
          npm ci
          npm run test:components -- --coverage || true

      - name: Upload component test coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: components
          name: component-coverage

  report-quality:
    name: Report Code Quality
    runs-on: ubuntu-latest
    needs: [sonarcloud, code-metrics, formatting-check, type-checking, component-tests]
    if: always()

    steps:
      - name: Create quality report
        run: |
          echo "## 📊 Code Quality Report"
          echo ""
          echo "| Check | Status |"
          echo "|-------|--------|"
          echo "| SonarCloud Analysis | ${{ needs.sonarcloud.result }} |"
          echo "| Code Metrics | ${{ needs.code-metrics.result }} |"
          echo "| Formatting Check | ${{ needs.formatting-check.result }} |"
          echo "| Type Checking | ${{ needs.type-checking.result }} |"
          echo "| Component Tests | ${{ needs.component-tests.result }} |"
          echo ""
          
          if [[ "${{ needs.sonarcloud.result }}" == "failure" ]]; then
            echo "⚠️  Quality checks failed - please review SonarCloud report"
            exit 1
          fi

name: Code Quality

on:
  push:
    branches: [main, dev]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/code-quality.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'frontend/**'
      - 'backend/**'

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    if: false   # disabled — SonarCloud is informational only and not required to pass
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  code-metrics:
    name: Code Metrics
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Calculate Python metrics
        run: |
          pip install radon
          
          echo "## Python Code Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Cyclomatic Complexity" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          radon cc backend --average || true >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Maintainability Index" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          radon mi backend --average || true >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Calculate JavaScript metrics
        run: |
          npm install -g cloc
          
          echo "## JavaScript Code Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Lines of Code" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cloc frontend --json | jq . || true >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  formatting-check:
    name: Code Formatting Check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Check Python formatting (Black)
        working-directory: backend
        run: |
          pip install black
          black --check . --diff

      - name: Check Python imports (isort)
        working-directory: backend
        run: |
          pip install isort
          isort --check-only . --diff

      - name: Check JavaScript formatting (Prettier)
        working-directory: frontend
        run: |
          npm ci
          npx prettier --check .

      - name: Lint JavaScript (ESLint)
        working-directory: frontend
        continue-on-error: true
        run: npm run lint

      - name: Lint Python (Flake8)
        working-directory: backend
        continue-on-error: true
        run: |
          pip install flake8
          flake8 . --max-line-length=120 --extend-ignore=E203

  type-checking:
    name: Type Checking
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Check TypeScript types
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit || true

  component-tests:
    name: Component & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Run component tests
        working-directory: frontend
        run: |
          npm ci
          npm run test:components -- --coverage || true

      - name: Upload component test coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: components
          name: component-coverage

  report-quality:
    name: Report Code Quality
    runs-on: ubuntu-latest
    needs: [code-metrics, formatting-check, type-checking, component-tests]
    if: always()

    steps:
      - name: Create quality report
        run: |
          echo "## 📊 Code Quality Report"
          echo ""
          echo "| Check | Status |"
          echo "|-------|--------|"
          echo "| Code Metrics | ${{ needs.code-metrics.result }} |"
          echo "| Formatting Check | ${{ needs.formatting-check.result }} |"
          echo "| Type Checking | ${{ needs.type-checking.result }} |"
          echo "| Component Tests | ${{ needs.component-tests.result }} |"

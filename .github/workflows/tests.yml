# Comprehensive Testing and CI/CD Workflow for RehaAdvisor
# This workflow runs tests on all components (frontend, backend) and performs
# security scanning and Docker build validation on every push and PR.
#
# Coverage Requirements:
# - Frontend (Jest): Minimum 70% line coverage
# - Backend (Pytest): Minimum 75% line coverage
# 
# Workflow Steps:
# 1. Frontend Tests: JavaScript/TypeScript tests with Jest and coverage reporting
# 2. Backend Tests: Python tests with pytest and coverage reporting
# 3. Docker Build: Validates Docker images can build successfully
# 4. Security Scanning: Trivy filesystem scanning for vulnerabilities
# 5. Test Summary: Consolidates results and reports final status

name: Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/tests.yml'
      - 'docker-compose*.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/tests.yml'
      - 'docker-compose*.yml'

jobs:
  frontend-tests:
    name: Frontend Tests (Jest)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint code
        working-directory: frontend
        run: npm run lint || true

      - name: Run tests
        working-directory: frontend
        run: npm test -- --coverage --watchAll=false --testTimeout=10000

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

  backend-tests:
    name: Backend Tests (Pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    services:
      mongo:
        image: mongo:8.0
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Run flake8 linting
        working-directory: backend
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Run tests with pytest
        working-directory: backend
        env:
          MONGODB_URI: mongodb://admin:password@localhost:27017/reha_advisor_test?authSource=admin
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-cd
          DEBUG: 'False'
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term-summary -v

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [frontend-tests, backend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod.reha-advisor
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: reha-advisor:frontend-latest

      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: reha-advisor:backend-latest

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [frontend-tests, backend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests, docker-build, security-scan]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.frontend-tests.result }}" == "failure" || 
                "${{ needs.backend-tests.result }}" == "failure" ||
                "${{ needs.docker-build.result }}" == "failure" ]]; then
            echo "❌ Tests failed"
            exit 1
          else
            echo "✅ All tests passed"
          fi

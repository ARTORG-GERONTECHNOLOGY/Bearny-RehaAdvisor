# Comprehensive Testing and CI/CD Workflow for RehaAdvisor
# This workflow runs tests on all components (frontend, backend) and performs
# security scanning and Docker build validation on every push and PR.
#
# Coverage Requirements:
# - Frontend (Jest): Minimum 70% line coverage
# - Backend (Pytest): Minimum 75% line coverage
# 
# Workflow Steps:
# 1. Frontend Tests: JavaScript/TypeScript tests with Jest and coverage reporting
# 2. Backend Tests: Python tests with pytest and coverage reporting
# 3. Docker Build: Validates Docker images can build successfully
# 4. Security Scanning: Trivy filesystem scanning for vulnerabilities
# 5. Test Summary: Consolidates results and reports final status

name: Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/tests.yml'
      - 'docker-compose*.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/tests.yml'
      - 'docker-compose*.yml'

jobs:
  style-checks:
    name: Style Checks (FE + BE)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Check backend formatting (Black + isort)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          black --check . --diff
          isort --check-only . --diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Check frontend formatting (Prettier)
        working-directory: frontend
        run: |
          npm ci
          npx prettier --check .

  frontend-tests:
    name: Frontend Tests (Jest)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [style-checks]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint code
        working-directory: frontend
        run: npm run lint || true

      - name: Run tests
        working-directory: frontend
        run: npm test -- --coverage --watchAll=false --testTimeout=10000

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

  backend-tests:
    name: Backend Tests (Pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [style-checks]
    
    env:
      DJANGO_SETTINGS_MODULE: api.settings.dev
      SECRET_KEY: test-secret-key-for-ci-cd
      DEBUG: 'False'
      DB_HOST: localhost
      DB_PORT: '27017'
      DB_NAME: reha_advisor_test
      MONGO_TLS: 'false'
      DISABLE_MONGO_CONNECT: '1'
      REDIS_URL: redis://localhost:6379/0

    services:
      mongo:
        image: mongo:8.0
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Run flake8 linting
        working-directory: backend
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Run tests with pytest
        working-directory: backend
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term-summary -v

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [frontend-tests, backend-tests]

    env:
      DJANGO_SETTINGS_MODULE: api.settings.dev
      SECRET_KEY: test-secret-key-for-ci-cd
      DEBUG: 'False'
      DB_HOST: localhost
      DB_PORT: '27017'
      DB_NAME: reha_advisor_test
      MONGO_TLS: 'false'
      DISABLE_MONGO_CONNECT: '1'
      REDIS_URL: redis://localhost:6379/0
      E2E_API_URL: http://127.0.0.1:8001/api
      E2E_PATIENT_LOGIN: ${{ secrets.E2E_PATIENT_LOGIN }}
      E2E_PATIENT_PASSWORD: ${{ secrets.E2E_PATIENT_PASSWORD }}
      E2E_ADMIN_LOGIN: ${{ secrets.E2E_ADMIN_LOGIN }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_THERAPIST_LOGIN: ${{ secrets.E2E_THERAPIST_LOGIN }}
      E2E_THERAPIST_PASSWORD: ${{ secrets.E2E_THERAPIST_PASSWORD }}

    services:
      mongo:
        image: mongo:8.0
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Start backend server
        working-directory: backend
        run: |
          nohup python manage.py runserver 127.0.0.1:8001 >/tmp/django-e2e.log 2>&1 &
          for i in {1..45}; do
            status_code="$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8001/api/auth/login/ || true)"
            if [[ "$status_code" != "000" ]]; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not start in time"
          tail -n 200 /tmp/django-e2e.log || true
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run base E2E login flow
        working-directory: frontend
        run: npm run test:e2e -- e2e/home-login.spec.ts

      - name: Run seeded redirect E2E flow
        if: ${{ secrets.E2E_PATIENT_LOGIN != '' && secrets.E2E_PATIENT_PASSWORD != '' && secrets.E2E_ADMIN_LOGIN != '' && secrets.E2E_ADMIN_PASSWORD != '' }}
        working-directory: frontend
        run: npm run test:e2e -- e2e/home-login-success-redirects.spec.ts

      - name: Run seeded therapist 2FA E2E flow
        if: ${{ secrets.E2E_THERAPIST_LOGIN != '' && secrets.E2E_THERAPIST_PASSWORD != '' }}
        working-directory: frontend
        run: npm run test:e2e -- e2e/home-login-therapist.spec.ts

      - name: Run seeded patient page E2E flow
        if: ${{ secrets.E2E_PATIENT_LOGIN != '' && secrets.E2E_PATIENT_PASSWORD != '' }}
        working-directory: frontend
        run: npm run test:e2e -- e2e/patient-page.spec.ts

      - name: Run seeded patient interventions page E2E flow
        if: ${{ secrets.E2E_PATIENT_LOGIN != '' && secrets.E2E_PATIENT_PASSWORD != '' }}
        working-directory: frontend
        run: npm run test:e2e -- e2e/patient-interventions-page.spec.ts

      - name: Skip note when E2E seeded secrets are missing
        if: ${{ !(secrets.E2E_PATIENT_LOGIN != '' && secrets.E2E_PATIENT_PASSWORD != '' && secrets.E2E_ADMIN_LOGIN != '' && secrets.E2E_ADMIN_PASSWORD != '') }}
        run: |
          echo "Seeded redirect E2E tests skipped because one or more E2E_* secrets are missing."
          echo "Expected secrets: E2E_PATIENT_LOGIN, E2E_PATIENT_PASSWORD, E2E_ADMIN_LOGIN, E2E_ADMIN_PASSWORD."

      - name: Skip note when patient-page E2E secrets are missing
        if: ${{ !(secrets.E2E_PATIENT_LOGIN != '' && secrets.E2E_PATIENT_PASSWORD != '') }}
        run: |
          echo "Patient-page E2E test skipped because E2E_PATIENT_LOGIN/E2E_PATIENT_PASSWORD are missing."

      - name: Skip note when therapist E2E secrets are missing
        if: ${{ !(secrets.E2E_THERAPIST_LOGIN != '' && secrets.E2E_THERAPIST_PASSWORD != '') }}
        run: |
          echo "Therapist 2FA E2E test skipped because E2E_THERAPIST_LOGIN/E2E_THERAPIST_PASSWORD are missing."

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
            /tmp/django-e2e.log
          if-no-files-found: ignore

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [frontend-tests, backend-tests, frontend-e2e]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod.reha-advisor
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: reha-advisor:frontend-latest

      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: reha-advisor:backend-latest

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [frontend-tests, backend-tests, frontend-e2e]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [style-checks, frontend-tests, backend-tests, frontend-e2e, docker-build, security-scan]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.style-checks.result }}" == "failure" ||
                "${{ needs.frontend-tests.result }}" == "failure" || 
                "${{ needs.backend-tests.result }}" == "failure" ||
                "${{ needs.frontend-e2e.result }}" == "failure" ||
                "${{ needs.docker-build.result }}" == "failure" ]]; then
            echo "❌ Tests failed"
            exit 1
          else
            echo "✅ All tests passed"
          fi

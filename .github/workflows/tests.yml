# Comprehensive Testing and CI/CD Workflow for RehaAdvisor
# This workflow runs tests on all components (frontend, backend) and performs
# security scanning and Docker build validation on every push and PR.
#
# Secrets required:
#   ENV_FILE_DEV   — full contents of .env.dev (all Django / MongoDB / external-service config)
#   E2E_*          — optional credentials for seeded E2E flows (see frontend-e2e job)
#
# Coverage:
# - Frontend (Jest): reported to Codecov; thresholds are warnings only, never block CI
# - Backend (Pytest): reported to Codecov; thresholds are warnings only, never block CI
#
# Workflow Steps:
# 1. Style Checks: Black + isort (Python), Prettier (TypeScript)
# 2. Frontend Tests: JavaScript/TypeScript tests with Jest and coverage reporting
# 3. Backend Tests: Python tests with pytest and coverage reporting
# 4. Frontend E2E: Playwright browser tests against a live Django dev server
# 5. Docker Build: Validates Docker images can build successfully
# 6. Security Scanning: Trivy filesystem scanning for vulnerabilities
# 7. Test Summary: Consolidates results and reports final status

name: Tests

permissions:
  contents: read

on:
  push:
    branches: [main, dev]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/tests.yml'
      - 'docker-compose*.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/tests.yml'
      - 'docker-compose*.yml'

# ---------------------------------------------------------------------------
# Reusable step templates (referenced via YAML anchors where supported,
# but written out explicitly below for maximum GitHub Actions compatibility)
# ---------------------------------------------------------------------------

jobs:
  style-checks:
    name: Style Checks (FE + BE)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Check backend formatting (Black + isort)
        working-directory: backend
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          black --check . --diff
          isort --check-only . --diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Check frontend formatting (Prettier)
        working-directory: frontend
        run: |
          npm ci
          npx prettier --check .

  frontend-tests:
    name: Frontend Tests (Jest)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [style-checks]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint code
        working-directory: frontend
        run: npm run lint || true

      - name: Run tests
        working-directory: frontend
        # --coverageThreshold='{}' overrides config thresholds so coverage shortfalls
        # are warnings only and never block CI. || true removed so actual test
        # failures and suite errors DO fail this step.
        # --maxWorkers=1 runs suites serially; prevents concurrent heap pressure
        # from OOM-killing workers on coverage-instrumented runs.
        # --workerIdleMemoryLimit caps idle RSS so workers recycle between suites.
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm test -- --coverage --watchAll=false --testTimeout=10000 "--coverageThreshold={}" --maxWorkers=1 --workerIdleMemoryLimit=512MB

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

  backend-tests:
    name: Backend Tests (Pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [style-checks]

    # All backend tests use mongomock — no real MongoDB connection is made.
    # DISABLE_MONGO_CONNECT=1 prevents Django's CoreConfig.ready() from
    # attempting a startup connection, so no mongo service is needed here.
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write env file
        run: echo "${{ secrets.ENV_FILE_DEV }}" > .env

      - name: Load env file and apply CI overrides
        run: |
          # Export every non-comment, non-blank line from the env file
          while IFS= read -r line; do
            [[ "$line" =~ ^\s*# ]] && continue
            [[ -z "${line//[[:space:]]/}" ]] && continue
            echo "$line" >> "$GITHUB_ENV"
          done < .env
          # CI-specific overrides — these take precedence over env file values
          # because GITHUB_ENV entries set later win over earlier ones.
          echo "DB_HOST=localhost"                    >> "$GITHUB_ENV"
          echo "DISABLE_MONGO_CONNECT=1"             >> "$GITHUB_ENV"
          echo "MONGO_TLS=false"                     >> "$GITHUB_ENV"
          echo "REDIS_URL=redis://localhost:6379/0"  >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Run flake8 linting
        working-directory: backend
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

      - name: Run tests with pytest
        working-directory: backend
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term -v

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: [frontend-tests, backend-tests]

    # E2E credentials for seeded login flows — kept as explicit secret refs
    # because they are not part of the ENV_FILE_DEV env file.
    env:
      E2E_API_URL: http://127.0.0.1:8001/api
      E2E_EMAIL_DIR: /tmp/django-e2e-emails
      USE_E2E_FILE_EMAIL_BACKEND: "1"
      # Logins are non-sensitive — stored as Actions Variables (vars context)
      E2E_PATIENT_LOGIN: ${{ vars.E2E_PATIENT_LOGIN }}
      E2E_PATIENT_ID: ${{ vars.E2E_PATIENT_ID }}
      E2E_ADMIN_LOGIN: ${{ vars.E2E_ADMIN_LOGIN }}
      E2E_THERAPIST_LOGIN: ${{ vars.E2E_THERAPIST_LOGIN }}
      # Passwords are sensitive — stored as Actions Secrets (secrets context)
      E2E_PATIENT_PASSWORD: ${{ secrets.E2E_PATIENT_PASSWORD }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_THERAPIST_PASSWORD: ${{ secrets.E2E_THERAPIST_PASSWORD }}

    services:
      # MongoDB with auth — credentials from ENV_FILE_DEV are loaded in steps
      # below and passed to the connection string used by the Django server.
      # The service itself starts without credentials; the app connects using
      # the username/password from the loaded env file.
      mongo:
        image: mongo:8.0
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Write env file
        run: echo "${{ secrets.ENV_FILE_DEV }}" > .env

      - name: Load env file and apply CI overrides
        run: |
          # Export every non-comment, non-blank line from the env file
          while IFS= read -r line; do
            [[ "$line" =~ ^\s*# ]] && continue
            [[ -z "${line//[[:space:]]/}" ]] && continue
            echo "$line" >> "$GITHUB_ENV"
          done < .env
          # CI-specific overrides — take precedence over env file values.
          # DB_HOST: Docker Compose uses "db"; GitHub Actions runner uses localhost.
          # MONGO auth: the CI MongoDB service starts with no credentials, so
          #   clear username/password to avoid a connection-refused on auth.
          # MONGO_TLS: no TLS in the CI runner environment.
          # REDIS_URL: point at the service started above.
          # NOTE: DISABLE_MONGO_CONNECT is intentionally NOT set here so that
          #   the Django server can connect to MongoDB and serve real API responses
          #   for the Playwright tests.
          echo "DB_HOST=localhost"                       >> "$GITHUB_ENV"
          echo "MONGO_INITDB_ROOT_USERNAME="             >> "$GITHUB_ENV"
          echo "MONGO_INITDB_ROOT_PASSWORD="             >> "$GITHUB_ENV"
          echo "MONGO_TLS=false"                         >> "$GITHUB_ENV"
          echo "REDIS_URL=redis://localhost:6379/0"      >> "$GITHUB_ENV"
          # Allow the Playwright browser (127.0.0.1:4173) to reach the Django
          # dev server (127.0.0.1:8001) without a CORS block.
          echo "CORS_ALLOW_ALL_ORIGINS=true"             >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Seed E2E test users
        working-directory: backend
        run: python manage.py seed_e2e

      - name: Start backend server
        working-directory: backend
        run: |
          mkdir -p /tmp/django-e2e-emails
          nohup python manage.py runserver 127.0.0.1:8001 >/tmp/django-e2e.log 2>&1 &
          for i in {1..45}; do
            status_code="$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8001/api/auth/login/ || true)"
            if [[ "$status_code" != "000" ]]; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not start in time"
          tail -n 200 /tmp/django-e2e.log || true
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Run base E2E login flow
        working-directory: frontend
        run: npm run test:e2e -- e2e/home-login.spec.ts

      - name: Run seeded redirect E2E flow
        if: ${{ vars.E2E_PATIENT_LOGIN != '' }}
        working-directory: frontend
        run: npm run test:e2e -- e2e/home-login-success-redirects.spec.ts

      - name: Run seeded therapist 2FA E2E flow
        if: ${{ vars.E2E_THERAPIST_LOGIN != '' }}
        working-directory: frontend
        run: npm run test:e2e -- e2e/home-login-therapist.spec.ts

      - name: Run seeded patient page E2E flow
        if: ${{ vars.E2E_PATIENT_LOGIN != '' }}
        working-directory: frontend
        run: npm run test:e2e -- e2e/patient-page.spec.ts

      - name: Run seeded patient interventions page E2E flow
        if: ${{ vars.E2E_PATIENT_LOGIN != '' }}
        working-directory: frontend
        run: npm run test:e2e -- e2e/patient-interventions-page.spec.ts

      - name: Run seeded therapist rehab-table questionnaires E2E flow
        if: ${{ vars.E2E_THERAPIST_LOGIN != '' && vars.E2E_PATIENT_ID != '' }}
        working-directory: frontend
        run: npm run test:e2e -- e2e/therapist-rehabtable-questionnaires.spec.ts

      - name: Run seeded patient assigned questionnaires API E2E flow
        if: ${{ vars.E2E_PATIENT_LOGIN != '' && vars.E2E_THERAPIST_LOGIN != '' }}
        working-directory: frontend
        run: npm run test:e2e -- e2e/patient-assigned-questionnaires.spec.ts

      - name: Run seeded therapist questionnaire builder UI E2E flow
        if: ${{ vars.E2E_THERAPIST_LOGIN != '' && vars.E2E_PATIENT_ID != '' }}
        working-directory: frontend
        run: npm run test:e2e -- e2e/therapist-questionnaire-builder-flow.spec.ts

      - name: Skip note when E2E seeded secrets are missing
        if: ${{ vars.E2E_PATIENT_LOGIN == '' }}
        run: |
          echo "Seeded E2E tests skipped — E2E_PATIENT_LOGIN not set."

      - name: Skip note when therapist E2E secrets are missing
        if: ${{ vars.E2E_THERAPIST_LOGIN == '' }}
        run: |
          echo "Therapist 2FA E2E test skipped — E2E_THERAPIST_LOGIN not set."

      - name: Skip note when therapist questionnaire E2E prerequisites are missing
        if: ${{ vars.E2E_THERAPIST_LOGIN == '' || vars.E2E_PATIENT_ID == '' }}
        run: |
          echo "Therapist questionnaire E2E test skipped — E2E_THERAPIST_LOGIN and/or E2E_PATIENT_ID not set."

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
            /tmp/django-e2e.log
          if-no-files-found: ignore

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [frontend-tests, backend-tests, frontend-e2e]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./frontend/Dockerfile.prod.reha-advisor
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: reha-advisor:frontend-latest

      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: reha-advisor:backend-latest

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [frontend-tests, backend-tests, frontend-e2e]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [style-checks, frontend-tests, backend-tests, frontend-e2e, docker-build, security-scan]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.style-checks.result }}" == "failure" ||
                "${{ needs.style-checks.result }}" == "cancelled" ||
                "${{ needs.frontend-tests.result }}" == "failure" ||
                "${{ needs.frontend-tests.result }}" == "cancelled" ||
                "${{ needs.backend-tests.result }}" == "failure" ||
                "${{ needs.backend-tests.result }}" == "cancelled" ||
                "${{ needs.frontend-e2e.result }}" == "failure" ||
                "${{ needs.frontend-e2e.result }}" == "cancelled" ||
                "${{ needs.docker-build.result }}" == "failure" ||
                "${{ needs.docker-build.result }}" == "cancelled" ||
                "${{ needs.security-scan.result }}" == "failure" ||
                "${{ needs.security-scan.result }}" == "cancelled" ]]; then
            echo "❌ Tests failed"
            exit 1
          else
            echo "✅ All tests passed"
          fi

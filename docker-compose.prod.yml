
services:
  db:
    image: mongo:8.0.3
    container_name: db
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports:
      - "27017:27017"
    volumes:
      - ./mongo_data:/data/db  # Correctly map this volume to persist data
    networks:
      - telereha

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: django
    restart: always
    env_file: .env.prod
    depends_on:
      - db
    volumes:
      - static:/srv/app/static
      - media:/srv/app/media
    networks:
      - telereha
  nginx:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile.prod
      args:
        - VITE_API_URL=https://reha-advisor.ch/api
    container_name: nginx
    env_file: .env.prod
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - django
    volumes:
      - ./nginx/prod.nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/certbot/www:/var/www/certbot
      - ./nginx/certbot/conf:/etc/letsencrypt
      - static:/srv/app/static
      - media:/srv/app/media
    networks:
      - telereha

  certbot:
    image: certbot/certbot
    volumes:
      - ./nginx/certbot/www:/var/www/certbot
      - ./nginx/certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"
    networks:
      - telereha

volumes:
  mongo_data:
  static:
  media:

networks:
  telereha:

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bearny</title>
    <meta name="title" content="Bearny – Be Ready After Rehabilitation" />
    <meta
      name="description"
      content="Bearny is a digital telerehabilitation platform that connects patients and therapists through personalised exercise plans, remote progress monitoring, and standardised clinical assessments."
    />

    <!-- Google Search Console ownership verification -->
    <!-- Set VITE_GOOGLE_SITE_VERIFICATION in .env.production to activate -->
    <meta name="google-site-verification" content="%VITE_GOOGLE_SITE_VERIFICATION%" />

    <!-- Open Graph / social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://reha-advisor.ch/" />
    <meta property="og:title" content="Bearny – Be Ready After Rehabilitation" />
    <meta
      property="og:description"
      content="A digital telerehabilitation platform connecting patients and therapists through personalised exercise plans, remote progress monitoring, and standardised clinical assessments."
    />

    <!-- Icons -->
    <link rel="icon" href="/icons/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="48x48" href="/icons/pwa-48x48.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/pwa-96x96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/pwa-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <link rel="mask-icon" href="/icons/mask-icon.svg" color="#000000" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#F2F2F7" />
  </head>
  <body>
    <!-- Root Element for React App -->
    <div id="root"></div>
    <!-- Load React Application -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

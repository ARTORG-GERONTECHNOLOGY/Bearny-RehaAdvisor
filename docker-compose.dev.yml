services:
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: libretranslate
    environment:
      LT_LOAD_ONLY: "en,fr,de,it,nl,pt"
      LT_UPDATE_MODELS: "true"
      LT_PACKAGES_ROOT: /app/packages
    volumes:
      - libretranslate_packages:/app/packages
    restart: unless-stopped
    networks:
      - telereha

  db-dev:
    image: mongo:8.0.3
    container_name: db
    restart: always
    command: >
      mongod
      --auth
      --tlsMode requireTLS
      --tlsCertificateKeyFile /etc/ssl/mongo/server.pem
      --tlsCAFile /etc/ssl/mongo/ca.crt
      --tlsAllowConnectionsWithoutCertificates
      --bind_ip_all
    env_file:
      - ./.env.dev
    ports:
      - "27017:27017"
    volumes:
      - ./mongo_data:/data/db  # Correctly map this volume to persist data
      - ./mongo/tls:/etc/ssl/mongo:ro
      - ./mongo/init:/docker-entrypoint-initdb.d:ro
    networks:
      - telereha

  django-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: django
    restart: always
    env_file:
      - ./.env.dev
    ports:
      - 8001:8000
    environment:
      - APP_MODE=dev
      - REDIS_CA_CERT=/etc/ssl/mongo/ca.crt
    volumes:
      - ./backend/:/app
      - static:/app/static
      - media:/app/media
      - ./frontend/src/config/:/app/config
      - ./mongo/tls/ca.crt:/etc/ssl/mongo/ca.crt:ro
      - /tmp/django-e2e-emails:/tmp/django-e2e-emails

    depends_on:
      - db-dev
      - redis
    networks:
      - telereha

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: celery
    restart: always
    command: python -m celery -A api.celery:app worker --loglevel=info --statedb=/app/celery_worker.state
    volumes:
      - ./backend:/app
      - ./mongo/tls/ca.crt:/etc/ssl/mongo/ca.crt:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    env_file:
      - ./.env.dev
    depends_on:
      - django-dev
      - redis
    working_dir: /app
    environment:
      - DJANGO_SETTINGS_MODULE=api.settings.dev
      - PYTHONPATH=/app
      - CELERY_BROKER_URL=rediss://:${REDIS_PASSWORD:-dev-redis-secret}@redis:6379/0
      - CELERY_RESULT_BACKEND=rediss://:${REDIS_PASSWORD:-dev-redis-secret}@redis:6379/0
      - REDIS_CA_CERT=/etc/ssl/mongo/ca.crt
      - CELERY_WORKER_PREFETCH_MULTIPLIER=1
      - CELERY_WORKER_STATE_DB=/app/celery_worker.state
      # Certificate renewal — set CERTBOT_ENABLED=true in .env.dev to activate
      - CERTBOT_CONF_PATH=${CERTBOT_CONF_PATH:-/home/ubuntu/repos/telerehabapp/nginx/certbot/conf}
      - CERTBOT_WWW_PATH=${CERTBOT_WWW_PATH:-/home/ubuntu/repos/telerehabapp/nginx/certbot/www}
      - CERTBOT_NGINX_CONTAINER=${CERTBOT_NGINX_CONTAINER:-gateway}
    networks:
      - telereha

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: celery-beat
    restart: always
    working_dir: /app
    command: >
      python -m celery -A api.celery:app beat -l info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - ./.env.dev
    environment:
      - DJANGO_SETTINGS_MODULE=api.settings.dev
      - PYTHONPATH=/app
      - CELERY_BROKER_URL=rediss://:${REDIS_PASSWORD:-dev-redis-secret}@redis:6379/0
      - CELERY_RESULT_BACKEND=rediss://:${REDIS_PASSWORD:-dev-redis-secret}@redis:6379/0
      - REDIS_CA_CERT=/etc/ssl/mongo/ca.crt
      - DJANGO_CELERY_BEAT_DISABLE_SOLAR_SCHEDULE=True
      # Certificate renewal — set CERTBOT_ENABLED=true in .env.dev to activate
      - CERTBOT_CONF_PATH=${CERTBOT_CONF_PATH:-/home/ubuntu/repos/telerehabapp/nginx/certbot/conf}
      - CERTBOT_WWW_PATH=${CERTBOT_WWW_PATH:-/home/ubuntu/repos/telerehabapp/nginx/certbot/www}
      - CERTBOT_NGINX_CONTAINER=${CERTBOT_NGINX_CONTAINER:-gateway}
    volumes:
      - ./backend:/app
      - ./mongo/tls/ca.crt:/etc/ssl/mongo/ca.crt:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    depends_on:
      - django-dev
      - redis
    networks:
      - telereha

  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-dev-redis-secret}
      --tls-port 6379
      --port 0
      --tls-cert-file /etc/ssl/redis/server.crt
      --tls-key-file /etc/ssl/redis/server.key
      --tls-ca-cert-file /etc/ssl/redis/ca.crt
      --tls-auth-clients no
    volumes:
      - ./redis/tls:/etc/ssl/redis:ro
    healthcheck:
      test: ["CMD", "redis-cli", "--tls", "--cacert", "/etc/ssl/redis/ca.crt", "-a", "${REDIS_PASSWORD:-dev-redis-secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telereha

  react-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: react
    restart: always
    ports:
      - 3001:3000
    env_file:
      - ./.env.dev
    tty: true
    working_dir: /app
    command: sh -c "npm ci || npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    volumes:
      - ./frontend/:/app
      - node_modules:/app/node_modules
    depends_on:
      - django-dev
    networks:
      - telereha

  nginx-dev:
    build:
      context: ./nginx
      dockerfile: Dockerfile.dev
    container_name: nginx
    restart: always
    # Ports 80/443 are owned by the gateway when multi-stack routing is active.
    # To run dev-only without the gateway, restore:
    #   - "80:80"
    #   - "443:443"
    volumes:
      - static:/app/static
      - media:/app/media
      - ./nginx/dev.nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - django-dev
      - react-dev
      - db-dev
      - libretranslate
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - telereha

volumes:
  node_modules:
  mongo_data:
  media:
  static:
  libretranslate_packages:

networks:
  telereha:
    name: "telereha"

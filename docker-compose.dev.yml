services:
  db-dev:
    image: mongo:8.0.3
    container_name: db
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports:
      - "27017:27017"
    volumes:
      - ./mongo_data:/data/db  # Correctly map this volume to persist data
    networks:
      - telereha
  django-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: django
    restart: always
    env_file:
      - ./.env.dev
    ports:
      - 8001:8000
    volumes:
      - ./backend/:/srv/app
      - static:/srv/app/static
      - media:/srv/app/media
      - ./frontend/src/config/:/srv/app/config 
    depends_on:
      - db-dev
    networks:
      - telereha

  react-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: react
    restart: always
    ports:
      - 3001:3000
    env_file:
      - ./.env.dev
    tty: true
    volumes:
      - ./frontend/:/srv/app
      - node_modules:/srv/app/node_modules
    depends_on:
      - django-dev
    networks:
      - telereha

  nginx-dev:
    build:
      context: ./nginx
      dockerfile: Dockerfile.dev
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    restart: always
    volumes:
      - static:/srv/app/static
      - media:/srv/app/media
      - ./nginx/certbot/www:/var/www/certbot
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/dev.nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - django-dev
      - react-dev
      - db-dev
    networks:
      - telereha

volumes:
  node_modules:
  mongo_data:
  media:
  static:

networks:
  telereha:
    name: "telereha"

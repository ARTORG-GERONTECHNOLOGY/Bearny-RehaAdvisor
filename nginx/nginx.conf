server {
    listen 8000;
    server_name 159.100.246.89;

    # Serve Django Backend (API & Admin)
    location ~ ^/(admin|api) {
        proxy_pass http://django:8000;
        client_max_body_size 100M;  # Increase the allowed upload size
        proxy_redirect default;
        include /etc/nginx/app/include.forwarded;

        # Add CORS headers if needed
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE";
            add_header Access-Control-Allow-Headers "Origin, Authorization, Content-Type";
            return 204;
        }
    }

    # Serve media files correctly
    location /media/ {
        alias /srv/app/media/;  # ✅ Ensure proper alias mapping
        autoindex on;
        client_max_body_size 100M;
        access_log off;
        expires 6M;
        try_files $uri /$uri =404;
    }

    # Serve static files correctly
    location /static/ {
        alias /srv/app/static/;  # ✅ Ensure trailing slash
        autoindex on;
        expires 6M;
        try_files $uri /$uri =404;
        include /etc/nginx/app/include.forwarded;
    }
}

# Serve React Frontend (Vite)
server {
    listen 3000;
    server_name 159.100.246.89;

    location / {
        proxy_pass http://react:3000;
        client_max_body_size 100M;  # Ensure large files can be uploaded through React too
        proxy_redirect default;
        include /etc/nginx/app/include.forwarded;
    }
}

# Serve media and static files separately
server {
    listen 8080;
    server_name localhost;
    include log.conf;

    location /api_media/ {
        alias /srv/app/media/;  # ✅ Ensure trailing slash
        autoindex on;
        client_max_body_size 100M;
        include /etc/nginx/app/include.forwarded;
    }

    location /api_static/ {
        alias /srv/app/static/;
        autoindex on;
        client_max_body_size 100M;
        include /etc/nginx/app/include.forwarded;
    }
}

server {
    listen 3000;
    server_name localhost;
    include log.conf;

    location / {
        proxy_pass http://react:3000;
        client_max_body_size 100M;
        proxy_redirect default;
        include /etc/nginx/app/include.forwarded;
    }
}

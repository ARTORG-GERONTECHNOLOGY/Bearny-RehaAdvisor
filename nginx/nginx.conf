server {
  # Docker will map 8080 to 80
  listen 80;

  # Serve static files from shared volume 
  location /api_static/ {
    alias /srv/app/static;
    client_max_body_size 100M;  # Increase upload size for static files if necessary
  }

  # Serve media files from shared volume
  location /api_media/ {
    alias /srv/app/media;
    client_max_body_size 100M;  # Increase upload size for media files
  }

  # Redirect Django admin or API or websockets
  location ~ ^/(admin|api) {
    proxy_pass http://django:8000;
    client_max_body_size 100M;  # Increase the allowed upload size
    proxy_redirect default;
    include /etc/nginx/app/include.websocket;
    include /etc/nginx/app/include.forwarded;
  }

  # Redirect any other requests to the React server
  location / {
    proxy_pass http://react:3000;
    client_max_body_size 100M;  # Ensure large files can be uploaded through React too
    proxy_redirect default;
    #include /etc/nginx/app/include.websocket;
    include /etc/nginx/app/include.forwarded;
  }
}

# Gateway nginx — the only service bound to public ports 80/443.
# Terminates TLS and routes by hostname to the correct internal nginx.
# This file is independent of both dev and prod stacks.

# ── Rate limiting zones ───────────────────────────────────────────────────────
# Defined here (http context) so they apply to all server blocks below.
#
# login_limit   — 5 attempts per minute per IP; burst of 5 allowed immediately.
#                 Prevents brute-force password attacks. A legitimate user who
#                 mistyped their password 5 times will be held for ~1 min.
# register_limit — 3 registrations per minute per IP; prevents spam signups.
limit_req_zone $binary_remote_addr zone=login_limit:10m    rate=5r/m;
limit_req_zone $binary_remote_addr zone=register_limit:10m rate=3r/m;

# ── HTTP → HTTPS redirects ────────────────────────────────────────────────────
server {
    listen 80;
    server_name reha-advisor.ch www.reha-advisor.ch;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name dev.reha-advisor.ch;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Production → nginx-prod ─────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name reha-advisor.ch www.reha-advisor.ch;
    client_max_body_size 1g;

    ssl_certificate /etc/letsencrypt/live/reha-advisor.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reha-advisor.ch/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ── Admin API: IP allowlist ───────────────────────────────────────────
    # The admin dashboard (/api/admin/*) is only used by developers and
    # system administrators. Restrict access to known IPs so that even a
    # compromised or stolen token cannot be used from an untrusted network.
    #
    # The allowlist is evaluated against $remote_addr (the real client IP)
    # because the gateway is the first TLS termination point — no proxy sits
    # in front of it, so $remote_addr is always the actual caller.
    #
    # Add your IPs below, then reload nginx:
    #   docker exec gateway nginx -s reload
    location /api/admin/ {
        # Intentionally restricted to loopback only: admins reach this endpoint
        # by SSH-tunnelling to the server (ssh -L 8443:localhost:443 user@reha-advisor.ch)
        # rather than exposing it to the internet. To grant direct access from a
        # static IP instead, add:  allow X.X.X.X;
        allow 127.0.0.1;
        allow ::1;
        deny all;            # everyone else is rejected before reaching Django

        proxy_pass http://nginx-prod:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }

    # ── Auth endpoints: brute-force rate limiting ─────────────────────────
    # Login is limited to 5 requests/min per IP. A user who fat-fingers their
    # password multiple times will be delayed by at most ~1 minute before
    # their next attempt is accepted.
    location /api/auth/login/ {
        limit_req zone=login_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://nginx-prod:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Registration is limited to 3 requests/min per IP to prevent spam
    # account creation.
    location /api/auth/register/ {
        limit_req zone=register_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://nginx-prod:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ── Everything else ───────────────────────────────────────────────────
    location / {
        proxy_pass http://nginx-prod:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 60s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }
}

# ── Dev → nginx-dev ───────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name dev.reha-advisor.ch;
    client_max_body_size 1g;

    ssl_certificate /etc/letsencrypt/live/dev.reha-advisor.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.reha-advisor.ch/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://nginx:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket support for Vite HMR
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
    }
}

# HTTP — used by the dev-nginx reverse proxy (which terminates TLS externally).
# Direct HTTP access on port 8080 redirects to HTTPS.
server {
    listen 80;
    server_name reha-advisor.ch www.reha-advisor.ch localhost;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # When hit directly (not via the dev-nginx proxy) redirect to HTTPS
    location / {
        # X-Forwarded-Proto is set to "https" by the dev-nginx proxy;
        # if it is absent the request came in plain HTTP, so redirect.
        if ($http_x_forwarded_proto = "") {
            return 301 https://reha-advisor.ch$request_uri;
        }

        # Proxy already terminated TLS — serve normally
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://django-localprod:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 1g;
    }

    location /static/ {
        alias /srv/app/static/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /media/ {
        alias /srv/app/media/;
        expires 30d;
    }
}

# HTTPS — direct access (port 8443 externally → 443 internally).
server {
    listen 443 ssl;
    server_name reha-advisor.ch www.reha-advisor.ch;
    client_max_body_size 1g;

    ssl_certificate /etc/letsencrypt/live/reha-advisor.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reha-advisor.ch/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    location /api/ {
        proxy_pass http://django-localprod:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 1g;
    }

    location /static/ {
        alias /srv/app/static/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /media/ {
        alias /srv/app/media/;
        expires 30d;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }
}

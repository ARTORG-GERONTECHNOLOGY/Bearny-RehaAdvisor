# Production NGINX — HTTP only.
# SSL is terminated by the gateway; X-Forwarded-Proto is set there.
server {
    listen 80;
    server_name reha-advisor.ch www.reha-advisor.ch;
    client_max_body_size 1g;

    # Security headers (still applies — clients see HTTPS via gateway)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP: tightens what resources the page can load while allowing the content
    # the app genuinely needs:
    #   frame-src https: — intervention videos may come from YouTube or other platforms
    #   img-src   https: — intervention images may be hosted on external CDNs
    #   connect-src includes both *.sentry.io and *.ingest.sentry.io because
    #     Sentry's ingest endpoint is <org-id>.ingest.sentry.io (two levels deep —
    #     *.sentry.io only matches one level so the error-reporting POST was blocked)
    #   frame-ancestors 'none' — prevents the app from being embedded elsewhere (clickjacking)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://*.sentry.io https://*.ingest.sentry.io; media-src 'self' blob: https:; object-src 'none'; frame-src https:; frame-ancestors 'none';" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/json;

    access_log /var/log/nginx/reha-advisor-access.log;
    error_log  /var/log/nginx/reha-advisor-error.log;

    location /api/ {
        proxy_pass http://django-prod:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_connect_timeout 60s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /static/ {
        alias /srv/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Protected media files ────────────────────────────────────────────
    # nginx uses auth_request to validate the caller's JWT before serving
    # any file under /media/.  The subrequest hits /api/media-auth/ which
    # runs JWTAuthMiddleware + @permission_classes([IsAuthenticated]).
    # On 401/403 nginx returns that status directly to the client.
    #
    # The subrequest forwards both the Authorization header (used by API
    # clients and fetch() calls) and the Cookie header (used by browser-
    # native <video>/<audio>/<img> elements, which send the httpOnly JWT
    # access_token cookie automatically but no Authorization header).
    location = /api/media-auth/ {
        internal;
        proxy_pass http://django-prod:8000;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        # Forward both the Authorization header (API clients) and the Cookie
        # (browser-initiated requests from <video>/<audio> elements which send
        # the httpOnly JWT access_token cookie but no Authorization header).
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Cookie $http_cookie;
    }

    location /media/ {
        auth_request /api/media-auth/;
        error_page 401 = @media_401;
        error_page 403 = @media_403;
        alias /srv/app/media/;
        expires 7d;
        add_header Cache-Control "private";
    }

    location @media_401 {
        default_type application/json;
        return 401 '{"error":"Authentication required to access this file."}';
    }

    location @media_403 {
        default_type application/json;
        return 403 '{"error":"You do not have permission to access this file."}';
    }

    location = /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location /translate/ {
        proxy_pass http://libretranslate:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        rewrite ^/translate(/.*)$ $1 break;
    }

    location / {
        proxy_pass http://react-prod:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Accept-Encoding "";
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

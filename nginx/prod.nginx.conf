# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name reha-advisor.ch www.reha-advisor.ch;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name reha-advisor.ch www.reha-advisor.ch;

    ssl_certificate /etc/letsencrypt/live/reha-advisor.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reha-advisor.ch/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Permissions-Policy "geolocation=(), microphone=()";

    # Django API proxy
    location /api/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log /var/log/nginx/api_debug.log combined;

        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 10M;

        # Optional rate limiting
        # limit_req zone=api_limit burst=20 nodelay;
    }

    # Django static files
    location /static/ {
        alias /srv/app/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Django media files
    location /media/ {
        alias /srv/app/media/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # React frontend (SPA fallback)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }
}

# Optional: Define rate limiting zone (uncomment if using)
# http {
#     limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
# }

# ✅ Redirect all HTTP traffic to HTTPS (Optional)
server {
    listen 80;
    server_name 159.100.246.89;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ✅ Serve Static Files (Django Media & Static)
server {
    listen 8080;
    server_name 159.100.246.89;

    location /api_static/ {
        alias /srv/app/static;
        client_max_body_size 100M;
        expires max;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /api_media/ {
        alias /srv/app/media;
        client_max_body_size 100M;
    }
}

# ✅ Serve Django Backend (API & Admin)
server {
    listen 8000;
    server_name 159.100.246.89;

    location ~ ^/(admin|api) {
        proxy_pass http://django:8000;
        client_max_body_size 100M;
        proxy_redirect off;

        include /etc/nginx/app/include.forwarded;

        # ✅ CORS Headers for API
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS, PUT, DELETE";
        add_header Access-Control-Allow-Headers "Origin, Authorization, Content-Type";

        # ✅ WebSockets Support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}

# ✅ Serve React Frontend (Vite)
server {
    listen 3000;
    server_name 159.100.246.89;

    root /srv/app/frontend/dist;
    index index.html;

    # ✅ Correctly Serve React (SPA Mode)
    location / {
        try_files $uri /index.html;
    }

    # ✅ Cache Optimization for Static Assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ✅ Prevent Access to Source Maps (Optional)
    location ~* \.map$ {
        deny all;
        access_log off;
    }
}

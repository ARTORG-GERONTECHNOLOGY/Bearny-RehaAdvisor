
server {
    listen 80;
    server_name dev.reha-advisor.ch;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name dev.reha-advisor.ch;

    ssl_certificate /etc/letsencrypt/live/dev.reha-advisor.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.reha-advisor.ch/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer-when-downgrade;
    add_header Permissions-Policy "geolocation=(), microphone=()";

    # Proxy API to Django
    location /api/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dev static files
    location /static/ {
        alias /app/static/;
        access_log on;
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /media/ {
        alias /app/media/;
        access_log on;
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Proxy everything else (frontend) to Vite dev server
    location / {
        proxy_pass http://react:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Optional timeouts for dev
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    location /translate/ {
        proxy_pass http://libretranslate:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        rewrite ^/translate(/.*)$ $1 break;
    }

}
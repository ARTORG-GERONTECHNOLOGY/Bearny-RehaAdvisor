
server {
    listen 80;
    server_name dev.reha-advisor.ch;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name dev.reha-advisor.ch;
    client_max_body_size 50m;

    ssl_certificate /etc/letsencrypt/live/dev.reha-advisor.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.reha-advisor.ch/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer-when-downgrade;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(self)" always;

    # Proxy API to Django
    location /api/ {
        client_max_body_size 50m;
        
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ✅ timeouts help on shaky Wi-Fi / iPad
        proxy_connect_timeout 60s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        send_timeout 180s;
    }

    # Dev static files
    location /static/ {
        alias /app/static/;
        access_log on;
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /media/ {
        alias /app/media/;
        access_log on;
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";

        # Ensure correct content-type for media playback when nosniff is enabled
        types {
            audio/webm webm;
            video/webm webm;
            audio/ogg ogg;
            video/ogg ogv;
            audio/mpeg mp3;
            audio/mp4 m4a;
            audio/wav wav;
            video/mp4 mp4;
            application/pdf pdf;
            image/jpeg jpg jpeg;
            image/png png;
            image/webp webp;
        }
        default_type application/octet-stream;

        # Allow seeking/streaming
        add_header Accept-Ranges bytes;

        # Usually NOT needed; can break downloads if always forced
        # add_header Content-Disposition "inline";

        # Optional: avoid weird proxy buffering issues (usually not required for alias)
        # gzip off;
    }



    # Proxy everything else (frontend) to Vite dev server
    location / {
        proxy_pass http://react:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Optional timeouts for dev
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    location /translate/ {
        proxy_pass http://libretranslate:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        rewrite ^/translate(/.*)$ $1 break;
    }

}
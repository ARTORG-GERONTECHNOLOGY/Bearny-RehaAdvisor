# Dev nginx — sits behind the gateway, which terminates SSL.
# Serves plain HTTP on port 80; no SSL config or redirect needed here.
# To run dev standalone (without gateway), restore the HTTPS server block
# and port bindings in docker-compose.dev.yml.

server {
    listen 80;
    server_name dev.reha-advisor.ch;
    client_max_body_size 1g;

    location /api/ {
        client_max_body_size 1g;
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_connect_timeout 60s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        send_timeout 180s;
    }

    location /static/ {
        alias /app/static/;
        access_log on;
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /media/ {
        alias /app/media/;
        access_log on;
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";

        types {
            audio/webm webm;
            video/webm webm;
            audio/ogg ogg;
            video/ogg ogv;
            audio/mpeg mp3;
            audio/mp4 m4a;
            audio/wav wav;
            video/mp4 mp4;
            application/pdf pdf;
            image/jpeg jpg jpeg;
            image/png png;
            image/webp webp;
        }
        default_type application/octet-stream;
        add_header Accept-Ranges bytes;
    }

    location /translate/ {
        proxy_pass http://libretranslate:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        rewrite ^/translate(/.*)$ $1 break;
    }

    location / {
        proxy_pass http://react:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

}

services:
  db:
    image: mongo:8.0.3
    container_name: db
    restart: always
    ports:
      - 27017:27017
    env_file: ./.env.dev
    volumes:
      - ./mongo_data:/data/db  # Correctly map this volume to persist data
    networks:
      - telereha

  django:
    build: ./backend
    container_name: django
    restart: always
    env_file:
      - ./.env.dev
    ports:
      - 8001:8000
    volumes:
      - ./backend/:/srv/app
      - static:/srv/app/static
      - media:/srv/app/media
      - ./frontend/src/config/:/srv/app/config 
    depends_on:
      - db
    networks:
      - telereha


  react:
    build: ./frontend
    container_name: react
    restart: always
    ports:
      - 3001:3000
    env_file:
      - ./.env.dev
    tty: true
    volumes:
      - ./frontend/:/srv/app
      - node_modules:/srv/app/node_modules
    depends_on:
      - django
    networks:
      - telereha


  nginx:
    build: ./nginx
    container_name: nginx
    ports:
      - 3000:3000
      - 8000:8000
    restart: always
    volumes:
      - static:/srv/app/static
      - media:/srv/app/media
    depends_on:
      - django
      - react
      - db
    networks:
      - telereha


volumes:
  node_modules:
  mongo_data:  # Named volume for MongoDB data
  media:
  static:

networks:
  telereha:
    name: "telereha"

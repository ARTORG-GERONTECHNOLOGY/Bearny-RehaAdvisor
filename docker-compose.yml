services:
  db:
    image: mongo:latest
    container_name: dev-db
    restart: always
    ports:
      - 27017:27017
    env_file: ./.env.dev
    volumes:
      - ./mongo_data:/data/db  # Correctly map this volume to persist data
    network_mode: "host"

  django:
    build: ./backend
    container_name: dev-django
    command: "python manage.py runserver localhost:8000"
    restart: always
    env_file:
      - ./.env.dev
    ports:
      - 8000:8000
    volumes:
      - ./backend/:/srv/app
      - static:/srv/app/static
      - media:/srv/app/media
      - ./frontend/src/config/:/srv/app/config 
    depends_on:
      - db
    network_mode: "host"

  react:
    build: ./frontend
    container_name: dev-react
    command: npm start
    restart: always
    ports:
      - 3001:3000
    env_file:
      - ./.env.dev
    tty: true
    volumes:
      - ./frontend/:/srv/app
      - node_modules:/srv/app/node_modules
    depends_on:
      - django
    network_mode: "host"

  nginx:
    build: ./nginx
    container_name: dev-nginx
    ports:
      - 8080:80
    restart: always
    volumes:
      - static:/srv/app/static
      - media:/srv/app/media
    depends_on:
      - django
      - react
      - db
    network_mode: "host"

volumes:
  node_modules:
  mongo_data:  # Named volume for MongoDB data
  media:
  static:


version: '3.8'

services:
  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: libretranslate-prod
    environment:
      LT_LOAD_ONLY: "en,fr,de,it,nl,pt"
      LT_UPDATE_MODELS: "true"
      LT_PACKAGES_ROOT: /app/packages
    volumes:
      - libretranslate_packages:/app/packages
    restart: always
    networks:
      - telereha-prod

  # Production MongoDB with TLS
  db-prod:
    image: mongo:8.0.3
    container_name: db-prod
    restart: always
    command: >
      mongod
      --auth
      --keyFile /etc/ssl/mongo/keyfile
      --tlsMode requireTLS
      --tlsCertificateKeyFile /etc/ssl/mongo/server.pem
      --tlsCAFile /etc/ssl/mongo/ca.crt
      --tlsAllowConnectionsWithoutCertificates
      --bind_ip_all
      --replSet rs0
    env_file:
      - ./.env.prod
    volumes:
      - ./mongo_data_prod:/data/db
      - ./mongo/tls:/etc/ssl/mongo:ro
      - ./mongo/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --tls --tlsAllowInvalidCertificates localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telereha-prod

  # Redis for caching and Celery
  redis-prod:
    image: redis:7-alpine
    container_name: redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - ./redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telereha-prod

  # Production Django application
  # Images are built and pushed to GHCR by the deploy workflow.
  # Set GHCR_IMAGE in .env.prod, e.g.: GHCR_IMAGE=ghcr.io/your-org/telerehabapp
  # IMAGE_TAG defaults to "latest" (the workflow also pushes the :latest tag).
  django-prod:
    image: ${GHCR_IMAGE}-backend:${IMAGE_TAG:-latest}
    container_name: django-prod
    restart: always
    env_file:
      - ./.env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=api.settings.prod
      - PYTHONUNBUFFERED=1
    volumes:
      - static-prod:/srv/app/static
      - media-prod:/srv/app/media
      - ./data/db.sqlite3:/app/api/db.sqlite3
      - ./mongo/tls/ca.crt:/etc/ssl/mongo/ca.crt:ro
    depends_on:
      db-prod:
        condition: service_healthy
      redis-prod:
        condition: service_healthy
      libretranslate:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - telereha-prod

  # Celery worker for async tasks
  celery-prod:
    image: ${GHCR_IMAGE}-backend:${IMAGE_TAG:-latest}
    container_name: celery-prod
    restart: always
    command: python -m celery -A api.celery:app worker --loglevel=info --statedb=/app/celery_worker.state -c 4
    volumes:
      - ./mongo/tls/ca.crt:/etc/ssl/mongo/ca.crt:ro
    env_file:
      - ./.env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=api.settings.prod
      - PYTHONPATH=/app
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-changeme}@redis-prod:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-changeme}@redis-prod:6379/0
      - CELERY_WORKER_PREFETCH_MULTIPLIER=4
      - CELERY_WORKER_STATE_DB=/app/celery_worker.state
    working_dir: /app
    depends_on:
      redis-prod:
        condition: service_healthy
      db-prod:
        condition: service_healthy
    networks:
      - telereha-prod

  # Celery beat for scheduled tasks
  celery-beat-prod:
    image: ${GHCR_IMAGE}-backend:${IMAGE_TAG:-latest}
    container_name: celery-beat-prod
    restart: always
    working_dir: /app
    command: >
      python -m celery -A api.celery:app beat -l info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - ./.env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=api.settings.prod
      - PYTHONPATH=/app
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-changeme}@redis-prod:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-changeme}@redis-prod:6379/0
      - DJANGO_CELERY_BEAT_DISABLE_SOLAR_SCHEDULE=True
    volumes:
      - ./data/db.sqlite3:/app/api/db.sqlite3
      - ./mongo/tls/ca.crt:/etc/ssl/mongo/ca.crt:ro
    depends_on:
      redis-prod:
        condition: service_healthy
      db-prod:
        condition: service_healthy
    networks:
      - telereha-prod

  # React frontend — static build served via nginx-prod
  react-prod:
    image: ${GHCR_IMAGE}-frontend:${IMAGE_TAG:-latest}
    container_name: react-prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - telereha-prod

  # NGINX reverse proxy — HTTP only, gateway handles SSL/TLS
  nginx-prod:
    build:
      context: .
      dockerfile: ./nginx/Dockerfile.prod
      args:
        - VITE_API_URL=https://reha-advisor.ch/api
    container_name: nginx-prod
    restart: always
    depends_on:
      - django-prod
      - react-prod
    volumes:
      - ./nginx/conf/prod.reha-advisor.nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static-prod:/srv/app/static:ro
      - media-prod:/srv/app/media:rw
    networks:
      - telereha-prod

volumes:
  mongo_data_prod:
    driver: local
  redis_data_prod:
    driver: local
  static-prod:
    driver: local
  media-prod:
    driver: local
  libretranslate_packages:
    driver: local

networks:
  telereha-prod:
    driver: bridge
    name: telereha-prod
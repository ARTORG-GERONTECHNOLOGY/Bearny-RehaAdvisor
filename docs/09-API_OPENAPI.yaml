openapi: 3.0.3
info:
  title: RehaAdvisor Backend API
  version: 2026-02-27
  description: |
    Machine-readable API spec generated from `backend/core/urls.py`.
    Notes:
    - Some endpoints use legacy path spellings (e.g. `questionaire`, `recomendation`).
    - `GET /api/patients/health-combined-history/{patient_id}/` is declared twice in URL config;
      Django resolves the first declaration at runtime.
servers:
  - url: http://localhost:8001
security:
  - bearerAuth: []
tags:
  - name: Core
  - name: Auth
  - name: Users
  - name: Admin
  - name: Therapists
  - name: Patients
  - name: Interventions
  - name: Questionnaires
  - name: Fitbit
  - name: REDCap
  - name: Healthslider
paths:
  /api/:
    get:
      tags: [Core]
      summary: API index
      responses:
        '200':
          $ref: '#/components/responses/OK'

  /api/auth/login/:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login accepted
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/LoginSuccessTherapist2FA'
                  - $ref: '#/components/schemas/LoginSuccessToken'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/auth/logout/:
    post:
      tags: [Auth]
      summary: Logout
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LogoutRequest' }
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/auth/forgot-password/:
    post:
      tags: [Auth]
      summary: Reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Password reset email sent
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/auth/register/:
    post:
      tags: [Auth]
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registration accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegisterSuccessResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  /api/auth/send-verification-code/:
    post:
      tags: [Auth]
      summary: Send verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendVerificationCodeRequest'
      responses:
        '200':
          description: Verification code sent
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/auth/verify-code/:
    post:
      tags: [Auth]
      summary: Verify login code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyCodeRequest'
      responses:
        '200':
          description: Verification accepted, JWT issued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VerifyCodeSuccessResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /api/auth/token/refresh/:
    post:
      tags: [Auth]
      summary: Refresh JWT token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObjectBody'
      responses:
        '200': { $ref: '#/components/responses/OK' }

  /api/auth/get-user-info/{user_id}/:
    get:
      tags: [Auth]
      summary: Get user info
      parameters:
        - $ref: '#/components/parameters/user_id'
      responses:
        '200':
          description: User role profile summary
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GetUserInfoResponse' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/users/{user_id}/profile/:
    get:
      tags: [Users]
      summary: Get user profile
      parameters:
        - $ref: '#/components/parameters/user_id'
      responses:
        '200':
          description: Profile document
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/UserProfileTherapist'
                  - $ref: '#/components/schemas/UserProfilePatient'
    put:
      tags: [Users]
      summary: Update user profile
      parameters:
        - $ref: '#/components/parameters/user_id'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProfileUpdateRequest' }
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProfileUpdateResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
    delete:
      tags: [Users]
      summary: Deactivate user profile
      parameters:
        - $ref: '#/components/parameters/user_id'
      responses:
        '200':
          description: User soft-deleted (deactivated)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }

  /api/users/{therapist_id}/change-password/:
    put:
      tags: [Users]
      summary: Change password
      parameters:
        - $ref: '#/components/parameters/therapist_id'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangePasswordRequest' }
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /api/admin/pending-users/:
    get:
      tags: [Admin]
      summary: List pending users
      responses:
        '200':
          description: Pending users list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PendingUsersResponse' }

  /api/admin/accept-user/:
    post:
      tags: [Admin]
      summary: Accept pending user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserIdRequest' }
      responses:
        '200':
          description: User accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/admin/decline-user/:
    post:
      tags: [Admin]
      summary: Decline pending user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserIdRequest' }
      responses:
        '200':
          description: User declined
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/admin/therapist/access/:
    get:
      tags: [Admin]
      summary: Get therapist access settings
      responses:
        '200': { $ref: '#/components/responses/OK' }
    put:
      tags: [Admin]
      summary: Update therapist access settings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ObjectBody' }
      responses:
        '200': { $ref: '#/components/responses/OK' }

  /api/admin/therapist/access/{therapistId}/:
    get:
      tags: [Admin]
      summary: Get one therapist access setting
      parameters:
        - $ref: '#/components/parameters/therapistId'
      responses:
        '200': { $ref: '#/components/responses/OK' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Admin]
      summary: Update one therapist access setting
      parameters:
        - $ref: '#/components/parameters/therapistId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ObjectBody' }
      responses:
        '200': { $ref: '#/components/responses/OK' }

  /api/therapists/{therapist_id}/patients/:
    get:
      tags: [Therapists]
      summary: List therapist patients
      parameters:
        - $ref: '#/components/parameters/therapist_id'
      responses:
        '200': { $ref: '#/components/responses/OK' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/analytics/log:
    post:
      tags: [Therapists]
      summary: Create analytics log
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ObjectBody' }
      responses:
        '201': { $ref: '#/components/responses/Created' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /api/patients/rehabilitation-plan/patient/{patient_id}/:
    get:
      tags: [Patients]
      summary: Get rehabilitation plan for patient app view
      parameters:
        - $ref: '#/components/parameters/patient_id'
      responses:
        '200':
          description: Patient rehabilitation plan entries
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/RehabPlanPatientResponse'
                  - $ref: '#/components/schemas/RehabPlanPatientNoPlanResponse'
        '404': { $ref: '#/components/responses/NotFound' }

  /api/patients/rehabilitation-plan/therapist/{patient_id}/:
    get:
      tags: [Patients]
      summary: Get rehabilitation plan for therapist view
      parameters:
        - $ref: '#/components/parameters/patient_id'
      responses:
        '200':
          description: Therapist rehabilitation plan view
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RehabPlanTherapistResponse' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/interventions/add-to-patient/:
    post:
      tags: [Patients]
      summary: Add intervention to patient plan
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddInterventionToPatientRequest' }
      responses:
        '201':
          description: Sessions created/merged
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MutatePlanResponse' }
        '200':
          description: No new sessions, but request handled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MutatePlanResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/interventions/modify-patient/:
    post:
      tags: [Patients]
      summary: Modify intervention occurrences from date
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ModifyInterventionFromDateRequest' }
      responses:
        '200':
          description: Schedule updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MutatePlanResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/interventions/remove-from-patient/:
    post:
      tags: [Patients]
      summary: Remove intervention from patient plan
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RemoveInterventionFromPatientRequest' }
      responses:
        '200':
          description: Future dates removed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MutatePlanResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/interventions/complete/:
    post:
      tags: [Patients]
      summary: Mark intervention completed
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ObjectBody' }
      responses:
        '200': { $ref: '#/components/responses/OK' }

  /api/interventions/uncomplete/:
    post:
      tags: [Patients]
      summary: Unmark intervention completed
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ObjectBody' }
      responses:
        '200': { $ref: '#/components/responses/OK' }

  /api/patients/feedback/questionaire/:
    post:
      tags: [Patients]
      summary: Submit patient feedback
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ObjectBody' }
      responses:
        '200': { $ref: '#/components/responses/OK' }

  /api/patients/get-questions/{questionaire_type}/{patient_id}/:
    get:
      tags: [Patients]
      summary: Get feedback questions
      description: >
        Returns the ordered list of feedback questions for the given type.
        For `questionaire_type=Intervention`, supply `?interventionId=<id>` to
        receive the star-rating question (Frage 1) appropriate for that
        intervention's `content_type`. Without `interventionId` only the
        core questions (difficulty_scale, open_feedback) are returned.
        Questions are returned in UI order: star rating first, difficulty
        second, open feedback last.
      parameters:
        - $ref: '#/components/parameters/questionaire_type'
        - $ref: '#/components/parameters/patient_id'
        - in: query
          name: interventionId
          schema: { type: string }
          description: >
            ObjectId of the intervention being rated. Required for the
            star-rating question (Frage 1) to be included. The backend first
            checks the patient's rehabilitation plan; if not found, it looks up
            the Intervention document directly (library-browse path).
      responses:
        '200':
          description: Ordered list of feedback questions
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeedbackQuestionsResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/patients/get-questions/{questionaire_type}/{patient_id}/{intervention_id}/:
    get:
      tags: [Patients]
      summary: Get feedback questions (intervention id in path)
      description: >
        Same as the query-parameter variant but accepts the intervention id as
        a path segment. Both forms are supported for backwards compatibility.
      parameters:
        - $ref: '#/components/parameters/questionaire_type'
        - $ref: '#/components/parameters/patient_id'
        - $ref: '#/components/parameters/intervention_id'
      responses:
        '200':
          description: Ordered list of feedback questions
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FeedbackQuestionsResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/users/{patient_id}/initial-questionaire/:
    post:
      tags: [Patients]
      summary: Submit initial questionnaire
      parameters:
        - $ref: '#/components/parameters/patient_id'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InitialQuestionnaireSubmitRequest' }
      responses:
        '201':
          description: Questionnaire submitted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessBooleanMessageResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
    get:
      tags: [Patients]
      summary: Check if initial questionnaire is required
      parameters:
        - $ref: '#/components/parameters/patient_id'
      responses:
        '200':
          description: Requirement check result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InitialQuestionnaireRequiredResponse' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/patients/healthstatus-history/{patient_id}/:
    get:
      tags: [Patients]
      summary: Health status history
      parameters:
        - $ref: '#/components/parameters/patient_id'
      responses:
        '200': { $ref: '#/components/responses/OK' }

  /api/patients/health-combined-history/{patient_id}/:
    get:
      tags: [Patients, Fitbit]
      summary: Combined health history (effective mapping)
      description: Runtime mapping resolves to `patient_views.get_combined_health_data` due to first-match URL order.
      parameters:
        - $ref: '#/components/parameters/patient_id'
      responses:
        '200': { $ref: '#/components/responses/OK' }

  /api/patients/vitals/manual/{patient_id}/:
    post:
      tags: [Patients]
      summary: Add manual vitals
      parameters:
        - $ref: '#/components/parameters/patient_id'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ObjectBody' }
      responses:
        '200': { $ref: '#/components/responses/OK' }

  /api/patients/vitals/exists/{patient_id}/:
    get:
      tags: [Patients]
      summary: Check if vitals exist for day
      parameters:
        - $ref: '#/components/parameters/patient_id'
      responses:
        '200': { $ref: '#/components/responses/OK' }

  /api/patients/{patient_id}/thresholds/:
    get:
      tags: [Patients]
      summary: Get patient thresholds
      parameters:
        - $ref: '#/components/parameters/patient_id'
      responses:
        '200':
          description: Thresholds and history
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ThresholdGetResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Patients]
      summary: Update patient thresholds (POST)
      parameters:
        - $ref: '#/components/parameters/patient_id'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ThresholdUpdateRequest' }
      responses:
        '200':
          description: Thresholds updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ThresholdUpdateResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
    patch:
      tags: [Patients]
      summary: Update patient thresholds (PATCH)
      parameters:
        - $ref: '#/components/parameters/patient_id'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ThresholdUpdateRequest' }
      responses:
        '200':
          description: Thresholds updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ThresholdUpdateResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /api/interventions/all/:
    get:
      tags: [Interventions]
      summary: List interventions
      description: >
        Returns all public interventions grouped by `external_id` (best language
        variant selected). Each item includes `avg_rating` (average star rating
        across all patients, rounded to 1 dp; `null` when unrated) and
        `rating_count` (total individual star ratings submitted).
      parameters:
        - in: query
          name: lang
          schema: { type: string }
          description: ISO language code for variant selection (e.g. `de`).
        - in: query
          name: external_id
          schema: { type: string }
          description: Return only the single group matching this external id.
      responses:
        '200':
          description: Array of intervention summary objects
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/InterventionSummary' }

  /api/interventions/all/{patient_id}/:
    get:
      tags: [Interventions]
      summary: List interventions including patient-private entries
      description: >
        Same as `/api/interventions/all/` but also includes private interventions
        created for this specific patient. `avg_rating` and `rating_count` are
        included for all items.
      parameters:
        - $ref: '#/components/parameters/patient_id'
        - in: query
          name: lang
          schema: { type: string }
      responses:
        '200':
          description: Array of intervention summary objects
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/InterventionSummary' }

  /api/interventions/add/:
    post:
      tags: [Interventions]
      summary: Create intervention
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddInterventionRequest' }
          multipart/form-data:
            schema: { $ref: '#/components/schemas/AddInterventionRequest' }
      responses:
        '200':
          description: Intervention created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AddInterventionResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /api/interventions/{intervention_id}/:
    get:
      tags: [Interventions]
      summary: Get intervention detail
      parameters:
        - $ref: '#/components/parameters/intervention_id'
        - in: query
          name: lang
          schema: { type: string }
      responses:
        '200': { $ref: '#/components/responses/OK' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/interventions/{intervention}/assigned-diagnoses/{specialisation}/therapist/{therapist_id}/:
    get:
      tags: [Interventions]
      summary: Get assigned diagnoses for intervention
      parameters:
        - $ref: '#/components/parameters/intervention'
        - $ref: '#/components/parameters/specialisation'
        - $ref: '#/components/parameters/therapist_id'
      responses:
        '200': { $ref: '#/components/responses/OK' }

  /api/recomendation/add/patientgroup/:
    post:
      tags: [Interventions]
      summary: Create patient group for intervention
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ObjectBody' }
      responses:
        '200': { $ref: '#/components/responses/OK' }

  /api/therapists/{therapist_id}/interventions/assign-to-patient-types/:
    post:
      tags: [Interventions]
      summary: Assign intervention schedule to diagnosis
      parameters:
        - $ref: '#/components/parameters/therapist_id'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ObjectBody' }
      responses:
        '200': { $ref: '#/components/responses/OK' }

  /api/therapists/{therapist_id}/interventions/remove-from-patient-types/:
    post:
      tags: [Interventions]
      summary: Remove diagnosis assignment from intervention
      parameters:
        - $ref: '#/components/parameters/therapist_id'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ObjectBody' }
      responses:
        '200': { $ref: '#/components/responses/OK' }

  /api/therapists/{therapist_id}/template-plan:
    get:
      tags: [Interventions]
      summary: Template plan preview
      parameters:
        - $ref: '#/components/parameters/therapist_id'
        - in: query
          name: diagnosis
          schema: { type: string }
        - in: query
          name: horizon
          schema: { type: integer }
      responses:
        '200': { $ref: '#/components/responses/OK' }

  /api/therapists/{therapist_id}/templates/apply:
    post:
      tags: [Interventions]
      summary: Apply template to patient
      parameters:
        - $ref: '#/components/parameters/therapist_id'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ObjectBody' }
      responses:
        '200': { $ref: '#/components/responses/OK' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /api/interventions/import/excel:
    post:
      tags: [Interventions]
      summary: Import interventions from Excel
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: '#/components/schemas/ObjectBody' }
      responses:
        '200': { $ref: '#/components/responses/OK' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /api/questionnaires/health/:
    get:
      tags: [Questionnaires]
      summary: List health questionnaires
      responses:
        '200':
          description: Questionnaire catalog

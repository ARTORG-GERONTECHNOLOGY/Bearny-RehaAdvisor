            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/HealthQuestionnaireListItem' }

  /api/questionnaires/patient/{patient_id}/:
    get:
      tags: [Questionnaires]
      summary: List questionnaires assigned to patient
      parameters:
        - $ref: '#/components/parameters/patient_id'
      responses:
        '200':
          description: Assigned questionnaires for patient
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/PatientQuestionnaireAssignment' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/questionnaires/assign/:
    post:
      tags: [Questionnaires]
      summary: Assign questionnaire
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AssignQuestionnaireRequest' }
      responses:
        '200':
          description: Assigned or updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AssignQuestionnaireResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/questionnaires/remove/:
    post:
      tags: [Questionnaires]
      summary: Remove questionnaire
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RemoveQuestionnaireRequest' }
      responses:
        '200':
          description: Removed/no-op
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/questionnaires/dynamic/:
    get:
      tags: [Questionnaires]
      summary: List dynamic questionnaires by subject
      parameters:
        - in: query
          name: subject
          schema: { type: string }
      responses:
        '200':
          description: Dynamic questionnaire groups
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DynamicQuestionnaireGroup' }

  /api/fitbit/callback/:
    get:
      tags: [Fitbit]
      summary: Fitbit OAuth callback
      parameters:
        - in: query
          name: code
          schema: { type: string }
        - in: query
          name: state
          schema: { type: string }
      responses:
        '200': { $ref: '#/components/responses/OK' }
        '302':
          description: Redirect response

  /api/fitbit/status/{patient_id}/:
    get:
      tags: [Fitbit]
      summary: Fitbit connection status
      parameters:
        - $ref: '#/components/parameters/patient_id'
      responses:
        '200':
          description: Fitbit connectivity status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FitbitStatusResponse' }

  /api/fitbit/health-data/{patient_id}/:
    get:
      tags: [Fitbit]
      summary: Fitbit health data history
      parameters:
        - $ref: '#/components/parameters/patient_id'
      responses:
        '200':
          description: Fitbit health data
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FitbitHealthDataResponse' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/fitbit/summary/:
    get:
      tags: [Fitbit]
      summary: Fitbit summary for current user
      parameters:
        - in: query
          name: days
          schema: { type: integer }
        - in: query
          name: patientId
          schema: { type: string }
      responses:
        '200':
          description: Fitbit summary
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FitbitSummaryResponse' }

  /api/fitbit/summary/{patient_id}/:
    get:
      tags: [Fitbit]
      summary: Fitbit summary for selected patient
      parameters:
        - $ref: '#/components/parameters/patient_id'
        - in: query
          name: days
          schema: { type: integer }
      responses:
        '200':
          description: Fitbit summary
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FitbitSummaryResponse' }

  /api/fitbit/manual_steps/{patient_id}/:
    post:
      tags: [Fitbit]
      summary: Store manual step count
      parameters:
        - $ref: '#/components/parameters/patient_id'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FitbitManualStepsRequest' }
      responses:
        '200':
          description: Manual steps stored
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FitbitManualStepsResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/redcap/projects/:
    get:
      tags: [REDCap]
      summary: List REDCap projects available to therapist
      responses:
        '200': { $ref: '#/components/responses/OK' }

  /api/redcap/patient/:
    get:
      tags: [REDCap]
      summary: Fetch REDCap patient data
      parameters:
        - in: query
          name: patient_code
          schema: { type: string }
        - in: query
          name: project
          schema: { type: string }
      responses:
        '200': { $ref: '#/components/responses/OK' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /api/redcap/available-patients/:
    get:
      tags: [REDCap]
      summary: List importable REDCap patients
      parameters:
        - in: query
          name: therapistUserId
          schema: { type: string }
        - in: query
          name: project
          schema: { type: string }
        - in: query
          name: patientId
          schema: { type: string }
        - in: query
          name: recordId
          schema: { type: string }
      responses:
        '200':
          description: Import candidates per allowed project
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RedcapAvailablePatientsResponse' }

  /api/redcap/import-patient/:
    post:
      tags: [REDCap]
      summary: Import one patient from REDCap
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RedcapImportPatientRequest' }
      responses:
        '201':
          description: Patient imported
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RedcapImportPatientSuccessResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/ServerError' }
        '502':
          description: Upstream REDCap error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ObjectBody' }

  /api/healthslider/items/:
    get:
      tags: [Healthslider]
      summary: List Healthslider items
      parameters:
        - in: query
          name: participantId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Healthslider entries
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthsliderItemsResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /api/healthslider/audio/{item_id}/:
    get:
      tags: [Healthslider]
      summary: Download Healthslider audio
      parameters:
        - $ref: '#/components/parameters/item_id'
      responses:
        '200':
          description: Audio stream or file

  /api/healthslider/submit-item/:
    post:
      tags: [Healthslider]
      summary: Submit Healthslider item response
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: '#/components/schemas/HealthsliderSubmitRequest' }
      responses:
        '201':
          description: Item submitted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkBooleanResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }

  /api/healthslider/delete-session/:
    get:
      tags: [Healthslider]
      summary: Download packaged Healthslider session ZIP
      parameters:
        - in: query
          name: participantId
          required: true
          schema: { type: string }
        - in: query
          name: sessionId
          required: false
          schema: { type: string }
      responses:
        '200': { $ref: '#/components/responses/OK' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    user_id:
      in: path
      name: user_id
      required: true
      schema: { type: string }
    patient_id:
      in: path
      name: patient_id
      required: true
      schema: { type: string }
    therapist_id:
      in: path
      name: therapist_id
      required: true
      schema: { type: string }
    therapistId:
      in: path
      name: therapistId
      required: true
      schema: { type: string }
    intervention_id:
      in: path
      name: intervention_id
      required: true
      schema: { type: string }
    intervention:
      in: path
      name: intervention
      required: true
      schema: { type: string }
    specialisation:
      in: path
      name: specialisation
      required: true
      schema: { type: string }
    questionaire_type:
      in: path
      name: questionaire_type
      required: true
      schema: { type: string }
    item_id:
      in: path
      name: item_id
      required: true
      schema: { type: string }
  schemas:
    FeedbackPossibleAnswer:
      type: object
      properties:
        key: { type: string, example: "3" }
        translations:
          type: array
          items:
            type: object
            properties:
              language: { type: string, example: "de" }
              text: { type: string, example: "★★★☆☆ (3/5)" }

    FeedbackQuestion:
      type: object
      description: >
        A single feedback question. `answerType` controls the UI widget:
        `select` with a `questionKey` starting with `rating_stars_` renders as
        a 5-star picker; `select` for other keys renders as a radio/dropdown;
        `text` renders as a free-text + audio field.
      properties:
        questionKey:
          type: string
          example: rating_stars_education
          enum:
            - rating_stars_education
            - rating_stars_exercise
            - difficulty_scale
            - open_feedback
        answerType:
          type: string
          enum: [select, text, multi-select, video]
        translations:
          type: array
          items:
            type: object
            properties:
              language: { type: string, example: "de" }
              text: { type: string, example: "Wie fandest du den Inhalt?" }
        possibleAnswers:
          type: array
          items: { $ref: '#/components/schemas/FeedbackPossibleAnswer' }

    FeedbackQuestionsResponse:
      type: object
      description: >
        Ordered list of feedback questions for the requested type. For
        `questionaire_type=Intervention` the order is always:
        1. Star rating (Frage 1) — `rating_stars_education` or `rating_stars_exercise`
        2. Difficulty scale (Frage 2) — `difficulty_scale`
        3. Open feedback — `open_feedback`
      properties:
        questions:
          type: array
          items: { $ref: '#/components/schemas/FeedbackQuestion' }

    InterventionSummary:
      type: object
      description: Intervention object as returned by GET /api/interventions/all/.
      properties:
        _id: { type: string, example: "507f1f77bcf86cd799439011" }
        external_id: { type: string, example: "EXT-001" }
        language: { type: string, example: "de" }
        available_languages:
          type: array
          items: { type: string }
          example: ["de", "en"]
        title: { type: string }
        description: { type: string }
        content_type:
          type: string
          example: Exercise
          enum: [Exercise, Video, Audio, Text, PDF, Website, Apps, Instruction, Education]
        aims:
          type: array
          items: { type: string }
        tags:
          type: array
          items: { type: string }
        duration: { type: integer, example: 15, description: "Minutes" }
        preview_img: { type: string, format: uri }
        media:
          type: array
          items: { type: object }
        is_private: { type: boolean }
        avg_rating:
          type: number
          format: float
          nullable: true
          example: 4.3
          description: >
            Average star rating (1–5) across all patients, rounded to 1 decimal
            place. `null` when no ratings have been submitted yet.
        rating_count:
          type: integer
          example: 12
          description: Total number of individual star ratings submitted.

    SuccessBooleanMessageResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
    InitialQuestionnaireRequiredResponse:
      type: object
      properties:
        success: { type: boolean }
        requires_questionnaire: { type: boolean }
    InitialQuestionnaireSubmitRequest:
      type: object
      required: [level_of_education, professional_status, marital_status, lifestyle, personal_goals]
      properties:
        level_of_education: { type: string }
        professional_status: { type: string }
        marital_status: { type: string }
        lifestyle:
          oneOf:
            - type: string
            - type: array
              items: { type: string }
        personal_goals:
          oneOf:
            - type: string
            - type: array
              items: { type: string }
    RehabPlanPatientEntry:
      type: object
      properties:
        intervention:
          type: object
          additionalProperties: true
        intervention_id: { type: string }
        intervention_title: { type: string }
        description: { type: string }
        content_type: { type: string }
        frequency: { type: string }
        notes: { type: string }
        require_video_feedback: { type: boolean }
        dates:
          type: array
          items: { type: string }
        completion_dates:
          type: array
          items: { type: string }
        feedback:
          type: array
          items: { type: object, additionalProperties: true }
    RehabPlanPatientResponse:
      type: array
      items: { $ref: '#/components/schemas/RehabPlanPatientEntry' }
    RehabPlanPatientNoPlanResponse:
      type: object
      properties:
        rehab_plan:
          type: array
          items: {}
        message: { type: string }
    RehabPlanTherapistResponse:
      type: object
      additionalProperties: true
      properties:
        success: { type: boolean }
        message: { type: string }
        rehab_plan:
          type: array
          items: {}
        interventions:
          type: array
          items: { type: object, additionalProperties: true }
    AddInterventionToPatientRequest:
      type: object
      required: [therapistId, patientId, interventions]
      properties:
        therapistId: { type: string }
        patientId: { type: string }
        language: { type: string }
        interventions:
          type: array
          items:
            type: object
            additionalProperties: true
            properties:
              interventionId: { type: string }
              externalId: { type: string }
              frequency: { type: string }
              interval: { type: integer }
              unit: { type: string }
              startDate: { type: string }
              startTime: { type: string }
              selectedDays:
                type: array
                items: { type: string }
              end:
                type: object
                additionalProperties: true
              notes: { type: string }
              require_video_feedback: { type: boolean }
    ModifyInterventionFromDateRequest:
      type: object
      required: [patientId, interventionId, effectiveFrom]
      properties:
        patientId: { type: string }
        interventionId: { type: string }
        effectiveFrom: { type: string }
        keep_current: { type: boolean }
        require_video_feedback: { type: boolean }
        notes: { type: string }
        schedule:
          type: object
          additionalProperties: true
    RemoveInterventionFromPatientRequest:
      type: object
      required: [patientId, intervention]
      properties:
        patientId: { type: string }
        intervention: { type: string }
    MutatePlanResponse:
      type: object
      additionalProperties: true
      properties:
        success: { type: boolean }
        message: { type: string }
        field_errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
        non_field_errors:
          type: array
          items: { type: string }
    HealthQuestionnaireListItem:
      type: object
      properties:
        _id: { type: string }
        key: { type: string }
        title: { type: string }
        description: { type: string }
        tags:
          type: array
          items: { type: string }
        question_count: { type: integer }
    PatientQuestionnaireAssignment:
      type: object
      properties:
        _id: { type: string }
        title: { type: string }
        description: { type: string }
        frequency: { type: string }
        dates:
          type: array
          items: { type: string }
    DynamicQuestionnaireGroup:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        count: { type: integer }
        question_ids:
          type: array
          items: { type: string }
    AssignQuestionnaireRequest:
      type: object
      required: [patientId]
      properties:
        patientId: { type: string }
        therapistId: { type: string }
        questionnaireId: { type: string }
        questionnaireKey: { type: string }
        groupKey: { type: string }
        frequency: { type: string }
        notes: { type: string }
        effectiveFrom: { type: string }
        subject: { type: string }
        schedule:
          type: object
          additionalProperties: true
    AssignQuestionnaireResponse:
      type: object
      properties:
        message: { type: string }
        questionnaireId: { type: string }
    RemoveQuestionnaireRequest:
      type: object
      required: [patientId, questionnaireId]
      properties:
        patientId: { type: string }
        questionnaireId: { type: string }
    HealthsliderSubmitRequest:
      type: object
      required: [participantId, sessionId]
      properties:
        participantId: { type: string }
        sessionId: { type: string }
        questionIndex: { type: integer }
        questionText: { type: string }
        answerValue:
          oneOf:
            - type: number
            - type: string
        answeredAt: { type: string }
        audioMime: { type: string }
        audio:
          type: string
          format: binary
    HealthsliderItem:
      type: object
      properties:
        id: { type: string }
        questionIndex: { type: integer }
        questionText: { type: string }
        answerValue: { type: number, nullable: true }
        hasAudio: { type: boolean }
        audioSize: { type: integer }
        audioName: { type: string, nullable: true }
        audioMime: { type: string, nullable: true }
        answeredAt: { type: string, nullable: true }
    HealthsliderItemsResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/HealthsliderItem' }
    OkBooleanResponse:
      type: object
      properties:
        ok: { type: boolean }
    LoginRequest:
      type: object
      required: [password]
      properties:
        email: { type: string }
        username: { type: string }
        password: { type: string }
    LoginSuccessTherapist2FA:
      type: object
      required: [user_type, id, require_2fa, request_id]
      properties:
        user_type: { type: string, example: Therapist }
        id: { type: string }
        require_2fa: { type: boolean, example: true }
        request_id: { type: string }
    LoginSuccessToken:
      type: object
      required: [user_type, id, access_token, refresh_token, require_2fa, request_id]
      properties:
        user_type: { type: string, example: Patient }
        id: { type: string }
        access_token: { type: string }
        refresh_token: { type: string }
        require_2fa: { type: boolean, example: false }
        request_id: { type: string }
    LogoutRequest:
      type: object
      required: [userId]
      properties:
        userId: { type: string }
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
    RegisterRequest:
      type: object
      required: [userType, email, password]
      properties:
        userType: { type: string, enum: [Patient, Therapist, Admin] }
        email: { type: string }
        password: { type: string }
        phone: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        therapist: { type: string, description: Required for patient registration }
        rehaEndDate: { type: string, format: date }
        clinic:
          type: array
          items: { type: string }
        projects:
          type: array
          items: { type: string }
    RegisterSuccessResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        id: { type: string }
    SendVerificationCodeRequest:
      type: object
      required: [userId]
      properties:
        userId: { type: string }
    VerifyCodeRequest:
      type: object
      required: [userId, verificationCode]
      properties:
        userId: { type: string }
        verificationCode: { type: string }
    VerifyCodeSuccessResponse:
      type: object
      properties:
        message: { type: string }
        access_token: { type: string }
        refresh_token: { type: string }
    GetUserInfoResponse:
      type: object
      properties:
        first_name: { type: string }
        last_name: { type: string }
        specialisation:
          oneOf:
            - type: string
            - type: array
              items: { type: string }
        function:
          oneOf:
            - type: string
            - type: array
              items: { type: string }
        role: { type: string }
    UserProfileTherapist:
      type: object
      properties:
        username: { type: string }
        email: { type: string }
        phone: { type: string }
        name: { type: string }
        first_name: { type: string }
        specializations:
          type: array
          items: { type: string }
        clinics:
          type: array
          items: { type: string }
    UserProfilePatient:
      type: object
      additionalProperties: true
      properties:
        username: { type: string }
        email: { type: string }
        phone: { type: string }
        first_name: { type: string }
        name: { type: string }
        diagnosis:
          type: array
          items: { type: string }
        function:
          type: array
          items: { type: string }
        reha_end_date: { type: string }
    ProfileUpdateRequest:
      type: object
      additionalProperties: true
      properties:
        oldPassword: { type: string }
        newPassword: { type: string }
    ProfileUpdateResponse:
      type: object
      properties:
        message: { type: string }
        updated:
          type: object
          additionalProperties: true
    ChangePasswordRequest:
      type: object
      properties:
        old_password: { type: string }
        new_password: { type: string }
    UserIdRequest:
      type: object
      required: [userId]
      properties:
        userId: { type: string }
    PendingUsersResponse:
      type: object
      properties:
        pending_users:
          type: array
          items:
            type: object
            additionalProperties: true
    ThresholdValues:
      type: object
      additionalProperties:
        type: number
    ThresholdHistoryItem:
      type: object
      properties:
        effective_from: { type: string, nullable: true }
        changed_by: { type: string, nullable: true }
        reason: { type: string }
        thresholds:
          $ref: '#/components/schemas/ThresholdValues'
    ThresholdGetResponse:
      type: object
      properties:
        ok: { type: boolean }
        patient_id: { type: string }
        thresholds:
          $ref: '#/components/schemas/ThresholdValues'
        history:
          type: array
          items: { $ref: '#/components/schemas/ThresholdHistoryItem' }
    ThresholdUpdateRequest:
      type: object
      properties:
        effective_from: { type: string, format: date-time }
        reason: { type: string }
        thresholds:
          $ref: '#/components/schemas/ThresholdValues'
      additionalProperties: true
    ThresholdUpdateResponse:
      type: object
      properties:
        ok: { type: boolean }
        message: { type: string }
        patient_id: { type: string }
        thresholds:
          $ref: '#/components/schemas/ThresholdValues'
    AddInterventionRequest:
      type: object
      required: [title, description, contentType, duration]
      additionalProperties: true
      properties:
        title: { type: string }
        description: { type: string }
        contentType: { type: string }
        duration: { type: integer }
        media:
          oneOf:
            - type: string
            - type: array
              items: { type: object, additionalProperties: true }
    AddInterventionResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        id: { type: string }
    FitbitStatusResponse:
      type: object
      properties:
        connected: { type: boolean }
    FitbitManualStepsRequest:
      type: object
      required: [date, steps]
      properties:
        date: { type: string, description: ISO date string accepted by backend }
        steps: { type: integer }
    FitbitManualStepsResponse:
      type: object
      properties:
        success: { type: boolean }
